capital_allocation:
  display_name: Capital Allocation Analysis
  description: How management deploys free cash flow across buybacks, dividends, M&A, capex, and debt paydown
  triggers:
  - capital allocation
  - how do they spend cash
  - buybacks
  - dividends
  - shareholder returns
  - capital deployment
  - use of cash
  - cash priorities
  - what are they doing with cash
  - reinvestment
  - capital return
  - shareholder yield
  - dividend policy
  - share repurchase
  primary_metrics:
    all:
    - free_cash_flow
    - total_shareholder_yield
    - dividend_yield
    - buyback_yield
    - capex_to_revenue
    real_estate:
    - funds_from_operations
    - dividend_yield
    - payout_ratio
  secondary_metrics:
    all:
    - payout_ratio
    - capex_to_depreciation
    - capital_expenditures
  context_prompt: Summarize management stated capital allocation priorities from earnings calls and proxy statements. Include
    discussion of dividend policy, buyback authorizations remaining, M&A strategy, and capex guidance. Note any changes in
    allocation philosophy.
  presentation:
    layout: profile
    include_peer_comparison: true
    include_historical_trend: true
earnings_quality:
  display_name: Earnings Quality Analysis
  description: Assessment of accounting quality, cash conversion, and sustainability of reported earnings
  triggers:
  - earnings quality
  - accounting quality
  - quality of earnings
  - cash conversion
  - accruals
  - aggressive accounting
  - conservative accounting
  - earnings manipulation
  - is this real
  - are earnings sustainable
  - red flags
  - accounting risk
  - revenue recognition risk
  - channel stuffing
  primary_metrics:
    all:
    - net_cash_provided_by_operating_activities
    - net_income
    - free_cash_flow
    - depreciation_amortization
    - stock_based_compensation
  secondary_metrics:
    all:
    - days_sales_outstanding
    - days_inventory_outstanding
    - deferred_revenue_current
    - changes_in_working_capital
    - accounts_receivable
    - inventory
  context_prompt: Analyze divergence between net income and operating cash flow over the past 8 quarters. Flag any changes
    in accounting policies, critical estimates, or revenue recognition methods disclosed in recent filings. Identify non-cash
    items and their growth trends relative to revenue. Note any audit committee or auditor commentary on accounting judgments.
  presentation:
    layout: profile
    include_peer_comparison: false
    include_historical_trend: true
