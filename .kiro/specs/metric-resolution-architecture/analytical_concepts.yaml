# FundLens Metric Registry
# Auto-generated from existing metrics mapping + GICS expansion
# Source: mini_MVP_metrics.xlsx + manual curation

leverage:
  display_name: Leverage Analysis
  description: Comprehensive view of debt levels, coverage, capacity, and refinancing risk
  triggers:
  - how levered
  - leverage
  - how much debt
  - debt load
  - gearing
  - balance sheet risk
  - how indebted
  - debt situation
  - debt profile
  - capital structure
  - debt capacity
  - borrowing capacity
  - financial risk
  - overleveraged
  - underleveraged
  - debt heavy
  - debt light
  - debt instruments
  - debt instrument
  - revolving credit
  - credit facility
  - term loans
  - term loan
  - bonds outstanding
  - notes payable
  - credit agreement
  - borrowings
  - indebtedness
  primary_metrics:
    all:
    - net_debt_to_ebitda
    - debt_to_equity
    - interest_coverage
    energy:
    - net_debt_to_ebitda
    - debt_to_equity
    - interest_coverage
    real_estate:
    - net_debt_to_ebitda
    - debt_to_equity
    banking:
    - tier_1_capital_ratio
    - loan_to_deposit_ratio
    private_equity:
    - net_debt_to_ebitda
    - interest_coverage
    - leverage_at_entry
  secondary_metrics:
    all:
    - total_debt
    - net_debt
    - debt_to_total_assets
    - debt_to_ebitda
    private_equity:
    - equity_contribution
  context_prompt: From the most recent 10-K, 10-Q, and earnings call transcripts, summarize management discussion of leverage
    targets, debt covenants, refinancing plans, debt maturity schedule, and any commentary on ability to service debt. Note
    any covenant compliance issues, upcoming maturities, or changes in credit ratings mentioned.
  presentation:
    layout: profile
    include_peer_comparison: true
    include_historical_trend: true
