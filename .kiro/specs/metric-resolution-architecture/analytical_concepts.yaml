management_alignment:
  display_name: Management Alignment & Credibility
  description: Insider ownership, compensation structure, guidance track record, and skin in the game
  triggers:
  - management alignment
  - skin in the game
  - insider ownership
  - management credibility
  - executive compensation
  - do they own stock
  - are they aligned
  - management quality
  - governance
  - board quality
  - insider buying
  - insider selling
  - compensation structure
  - say on pay
  primary_metrics:
    all: []
    private_equity:
    - carried_interest
    - management_fee
  secondary_metrics:
    all:
    - stock_based_compensation
    - equity_repurchased
  context_prompt: 'From the proxy statement and recent 8-Ks, summarize: (1) insider ownership percentages for CEO and board,
    (2) largest insider transactions in the last 12 months, (3) compensation structure and performance metrics tied to pay,
    (4) compare management forward-looking guidance from past 4 quarters against actual results. Note any governance concerns
    including related-party transactions, dual-class structures, or shareholder proposals.'
  presentation:
    layout: profile
    include_peer_comparison: false
    include_historical_trend: false
