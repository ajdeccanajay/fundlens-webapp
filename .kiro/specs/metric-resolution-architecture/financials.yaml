net_interest_margin:
  display_name: Net Interest Margin
  type: atomic
  statement: supplemental
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: banking
  synonyms:
  - NIM
  - net interest margin
  - net interest spread
  - interest margin
  - earning asset yield minus cost of funds
  - spread income margin
  xbrl_tags: []
  calculation_notes: Net interest income divided by average earning assets; core bank profitability metric
