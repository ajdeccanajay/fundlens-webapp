  - debt equity ratio
  - leverage D/E
  - gearing ratio
  - financial gearing
  - debt to book
  output_format: ratio
  output_suffix: x
  interpretation:
    conservative: < 0.5x
    moderate: 0.5x - 1.5x
    aggressive: '> 1.5x'
  calculation_notes: Total debt divided by total shareholders equity
debt_to_total_assets:
  display_name: Debt / Total Assets
  type: computed
  statement: null
  category: leverage
  asset_class:
  - public_equity
  - private_equity
  industry: all
