# FundLens Metric Registry
# Auto-generated from existing metrics mapping + GICS expansion
# Source: mini_MVP_metrics.xlsx + manual curation

gross_margin_pct:
  display_name: Gross Margin %
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: gross_profit / revenue * 100
  dependencies:
  - gross_profit
  - revenue
  synonyms:
  - gross margin
  - gross margin percent
  - gross margin %
  - GM%
  - gross profit margin
  - gross margin percentage
  - product margin
  output_format: percentage
  output_suffix: '%'
  calculation_notes: Revenue minus COGS as a percentage of revenue
operating_margin_pct:
  display_name: Operating Margin %
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: operating_income / revenue * 100
  dependencies:
  - operating_income
  - revenue
  synonyms:
  - operating margin
  - operating margin percent
  - op margin
  - EBIT margin
  - operating profit margin
  - operating income margin
  output_format: percentage
  output_suffix: '%'
  calculation_notes: Operating income as a percentage of revenue
ebitda_margin_pct:
  display_name: EBITDA Margin %
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: ebitda / revenue * 100
  dependencies:
  - ebitda
  - revenue
  synonyms:
  - EBITDA margin
  - EBITDA margin percent
  - cash margin
  - EBITDA as percent of revenue
  output_format: percentage
  output_suffix: '%'
  calculation_notes: EBITDA as a percentage of revenue
net_margin_pct:
  display_name: Net Margin %
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: net_income / revenue * 100
  dependencies:
  - net_income
  - revenue
  synonyms:
  - net margin
  - net profit margin
  - net margin percent
  - bottom line margin
  - profit margin
  - net income margin
  output_format: percentage
  output_suffix: '%'
  calculation_notes: Net income as a percentage of revenue
return_on_equity:
  display_name: Return on Equity
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: net_income / total_equity * 100
  dependencies:
  - net_income
  - total_equity
  synonyms:
  - ROE
  - return on equity
  - equity return
  - return on shareholders equity
  - return on book equity
  output_format: percentage
  output_suffix: '%'
  interpretation:
    strong: '> 15%'
    adequate: 10% - 15%
    weak: < 10%
  calculation_notes: Net income divided by average total equity
return_on_assets:
  display_name: Return on Assets
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: net_income / total_assets * 100
  dependencies:
  - net_income
  - total_assets
  synonyms:
  - ROA
  - return on assets
  - asset return
  - return on total assets
  output_format: percentage
  output_suffix: '%'
  calculation_notes: Net income divided by average total assets
return_on_invested_capital:
  display_name: Return on Invested Capital
  type: computed
  statement: null
  category: profitability
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: nopat / invested_capital * 100
  dependencies:
  - operating_income
  - income_taxes
  - total_equity
  - long_term_debt
  synonyms:
  - ROIC
  - return on invested capital
  - return on capital
  - ROCE
  - return on capital employed
  - return on total capital
  output_format: percentage
  output_suffix: '%'
  interpretation:
    value_creating: '> WACC'
    strong: '> 15%'
    adequate: 10% - 15%
  calculation_notes: NOPAT (operating income * (1 - tax rate)) divided by invested capital (equity + debt)
net_debt:
  display_name: Net Debt
  type: computed
  statement: null
  category: leverage
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: total_debt - cash_and_cash_equivalents
  dependencies:
  - long_term_debt
  - short_term_debt
  - cash_and_cash_equivalents
  synonyms:
  - net debt
  - net borrowings
  - net leverage amount
  - debt net of cash
  - debt minus cash
  - net financial debt
  output_format: currency
  calculation_notes: Total debt (short-term + long-term) minus cash and equivalents
total_debt:
  display_name: Total Debt
  type: computed
  statement: null
  category: leverage
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: long_term_debt + short_term_debt
  dependencies:
  - long_term_debt
  - short_term_debt
  synonyms:
  - total debt
  - total borrowings
  - gross debt
  - total indebtedness
  - aggregate debt
  - funded debt
  output_format: currency
  calculation_notes: Sum of short-term and long-term debt
net_debt_to_ebitda:
  display_name: Net Debt / EBITDA
  type: computed
  statement: null
  category: leverage
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: net_debt / ebitda
  dependencies:
  - net_debt
  - ebitda
  synonyms:
  - net debt to EBITDA
  - net leverage ratio
  - leverage ratio
  - leverage multiple
  - ND/EBITDA
  - net leverage
  - net debt EBITDA
  - turns of leverage
  - how levered
  output_format: ratio
  output_suffix: x
  interpretation:
    healthy: < 2.0x
    moderate: 2.0x - 4.0x
    elevated: '> 4.0x'
  calculation_notes: Primary leverage metric; net debt divided by LTM EBITDA
debt_to_equity:
  display_name: Debt / Equity
  type: computed
  statement: null
  category: leverage
  asset_class:
  - public_equity
  - private_equity
  industry: all
  formula: total_debt / total_equity
  dependencies:
  - total_debt
  - total_equity
  synonyms:
