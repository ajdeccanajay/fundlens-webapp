<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #4338ca;
        }
        input[type="file"] {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Document Upload Test</h1>
    
    <div>
        <h3>Step 1: Set Authentication</h3>
        <button onclick="setMockAuth()">Set Mock Auth Token</button>
        <div id="authStatus"></div>
    </div>
    
    <div>
        <h3>Step 2: Select File</h3>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
    </div>
    
    <div>
        <h3>Step 3: Upload</h3>
        <button onclick="testUpload()">Upload File</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div>
        <h3>Console Log:</h3>
        <div id="log" class="log"></div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        function setMockAuth() {
            // Create mock JWT token
            const base64url = (str) => {
                return btoa(str)
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_')
                    .replace(/=/g, '');
            };
            
            const header = base64url(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
            const payload = base64url(JSON.stringify({
                sub: '00000000-0000-0000-0000-000000000001',
                email: 'test@fundlens.ai',
                email_verified: true,
                'custom:tenant_id': '00000000-0000-0000-0000-000000000000',
                'custom:tenant_slug': 'default',
                'custom:tenant_role': 'admin',
                iat: Math.floor(Date.now() / 1000),
                exp: Math.floor(Date.now() / 1000) + 86400,
                iss: 'fundlens-test'
            }));
            const signature = 'test-signature';
            
            const token = `${header}.${payload}.${signature}`;
            localStorage.setItem('fundlens_token', token);
            localStorage.setItem('fundlens_user', JSON.stringify({
                email: 'test@fundlens.ai',
                tenantId: '00000000-0000-0000-0000-000000000000',
                tenantSlug: 'default',
                tenantName: 'Test Tenant',
                role: 'admin'
            }));
            
            log('✅ Mock auth token set', 'success');
            document.getElementById('authStatus').innerHTML = '<span style="color: green;">✅ Authenticated</span>';
        }
        
        async function testUpload() {
            clearLog();
            log('🚀 Starting upload test...', 'info');
            
            // Check auth
            const token = localStorage.getItem('fundlens_token');
            if (!token) {
                log('❌ No auth token found. Click "Set Mock Auth Token" first.', 'error');
                return;
            }
            log('✅ Auth token found', 'success');
            
            // Check file
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                log('❌ No file selected', 'error');
                return;
            }
            
            log(`📁 File selected: ${file.name}`, 'info');
            log(`📄 File type: ${file.type}`, 'info');
            log(`📏 File size: ${(file.size / 1024).toFixed(2)} KB`, 'info');
            
            // Validate file type
            const allowedTypes = [
                'application/pdf',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'text/plain'
            ];
            
            if (!allowedTypes.includes(file.type)) {
                log(`❌ Invalid file type: ${file.type}`, 'error');
                log('✅ Allowed types: PDF, DOCX, TXT', 'info');
                return;
            }
            log('✅ File type valid', 'success');
            
            // Validate file size
            if (file.size > 10 * 1024 * 1024) {
                log('❌ File too large (max 10MB)', 'error');
                return;
            }
            log('✅ File size valid', 'success');
            
            // Get user info
            const user = JSON.parse(localStorage.getItem('fundlens_user') || '{}');
            log(`👤 User: ${user.email}`, 'info');
            log(`🏢 Tenant: ${user.tenantId}`, 'info');
            
            // Create FormData
            const formData = new FormData();
            formData.append('file', file);
            formData.append('tenantId', user.tenantId || '00000000-0000-0000-0000-000000000000');
            formData.append('ticker', 'AAPL');
            formData.append('documentType', 'user_upload'); // Required
            formData.append('extractionTier', 'basic');
            formData.append('userId', user.email || 'test@fundlens.ai');
            
            log('📦 FormData created with documentType: user_upload', 'info');
            
            // Upload using XMLHttpRequest
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    log(`📊 Upload progress: ${percent}%`, 'info');
                }
            });
            
            xhr.addEventListener('load', () => {
                log(`📥 Response status: ${xhr.status}`, 'info');
                log(`📥 Response: ${xhr.responseText}`, 'info');
                
                if (xhr.status === 200 || xhr.status === 201) {
                    log('✅ Upload successful!', 'success');
                    try {
                        const response = JSON.parse(xhr.responseText);
                        log(`📄 Document ID: ${response.documentId}`, 'success');
                        log(`📄 Status: ${response.status}`, 'success');
                    } catch (e) {
                        log('⚠️ Could not parse response', 'error');
                    }
                } else {
                    log(`❌ Upload failed with status ${xhr.status}`, 'error');
                }
            });
            
            xhr.addEventListener('error', () => {
                log('❌ Network error occurred', 'error');
            });
            
            xhr.open('POST', '/api/documents/upload');
            xhr.setRequestHeader('Authorization', `Bearer ${token}`);
            
            log('📤 Sending request to /api/documents/upload', 'info');
            xhr.send(formData);
        }
    </script>
</body>
</html>
