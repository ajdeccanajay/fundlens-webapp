<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - Provocations</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/filing-notifications.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="_module-config.js"></script>
    <script src="/app/_shell.js"></script>
    <script src="/app/_utils.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover { background: #f9fafb; }
        .nav-item.active { background: #eff6ff; color: #1a56db; border-left: 3px solid #1a56db; }
        .nav-item.active i { color: #1a56db; }
        .badge { position: absolute; top: 8px; right: 8px; background: #dc2626; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .tenant-badge { background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
    window.FundLensProvocationsView = function() {
        return {
            provocationsData: [],
            provocationsLoading: false,
            provocationsMode: null,
            sentimentData: null,
            presetQuestions: [],

            async init() { await this.loadProvocations(); },

            async loadProvocations(force) {
                var ticker = this.entityContext.value;
                if (!ticker) return;
                this.provocationsLoading = true;
                try {
                    var vr = await fetch('/api/provocations/' + ticker + '/value-investing');
                    var vd = await vr.json();
                    if (vd.success && vd.provocations?.length > 0) { this.provocationsData = vd.provocations; }
                    else if (force) {
                        var r = await fetch('/api/provocations/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticker: ticker, mode: 'provocations' }) });
                        var d = await r.json(); this.provocationsData = d.provocations || [];
                    } else {
                        var r2 = await fetch('/api/provocations/' + ticker + '?mode=provocations');
                        var d2 = await r2.json(); this.provocationsData = d2.provocations || [];
                    }
                    var sr = await fetch('/api/provocations/' + ticker + '/sentiment');
                    var sd = await sr.json();
                    if (sd.success) this.sentimentData = sd;
                } catch (e) { console.error('Failed to load provocations:', e); }
                finally { this.provocationsLoading = false; }
            },

            askProvocationInResearch(prov) {
                var q = prov.challengeQuestion || prov.challenge_question || prov.title;
                this.navigateToWithParams('research', { query: encodeURIComponent(q) });
            },

            async saveProvocationToScratchpad(prov) {
                var headers = this.getAuthHeaders();
                if (!headers) return;
                try {
                    var ticker = this.entityContext.value;
                    var content = '## ' + (prov.severity || '').replace('_', ' ') + ' — ' + prov.title + '\n\n**Observation:** ' + prov.observation + '\n\n**Implication:** ' + prov.implication + '\n\n**Challenge:** ' + (prov.challengeQuestion || prov.challenge_question) + '\n\n*Category: ' + prov.category + '*';
                    var resp = await fetch('/api/research/scratchpad/' + ticker, {
                        method: 'POST', headers: headers,
                        body: JSON.stringify({ content: content, type: 'provocation', tags: [ticker, 'provocation', prov.severity, prov.category].filter(Boolean) })
                    });
                    if (resp.ok) { this.loadScratchpadCount(); alert('Saved to scratchpad!'); }
                } catch (e) { console.error('Error saving:', e); alert('Error saving to scratchpad'); }
            }
        };
    };
    </script>
</head>
<body class="bg-gray-50">
    <div x-data="FundLensShell('provocations', FundLensProvocationsView())" x-init="init()" x-cloak>

        <!-- Nav Bar -->
        <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><div class="flex items-center space-x-4"><a href="/app/deals/index.html" class="flex items-center"><div class="bg-white px-3 py-1 rounded-lg"><img src="/fundlens-logo.png" alt="FundLens" class="h-8 w-auto"></div></a><div class="hidden sm:flex items-center"><span class="text-gray-300 mx-3">|</span><div class="tenant-badge px-3 py-1 rounded-full"><span class="text-white text-sm font-medium" x-text="user.tenantName || 'Loading...'"></span></div></div></div><div class="flex items-center space-x-4"><div class="relative"><button @click="filingNotifOpen = !filingNotifOpen" class="filing-notif-bell"><i class="fas fa-bell"></i><span x-show="filingNotifCount > 0" class="filing-notif-badge" x-text="filingNotifCount > 99 ? '99+' : filingNotifCount"></span></button><div x-show="filingNotifOpen" @click.away="filingNotifOpen = false" x-transition class="filing-notif-dropdown"><div class="filing-notif-header"><h3>New Filings</h3></div><div class="filing-notif-list"><template x-if="filingNotifications.length === 0"><div class="filing-notif-empty"><i class="fas fa-check-circle"></i><p>No new filings</p></div></template><template x-for="notif in filingNotifications" :key="notif.id"><div class="filing-notif-card"><span class="filing-type-badge" :class="getFilingTypeBadgeClass(notif.filingType)" x-text="notif.filingType"></span><div class="filing-notif-content"><div class="filing-notif-ticker" x-text="notif.ticker"></div><div class="filing-notif-date" x-text="formatFilingDate(notif.filingDate)"></div></div><button @click.stop="dismissFilingNotif(notif.id)" class="filing-notif-dismiss"><i class="fas fa-times"></i></button></div></template></div></div></div><div class="relative" x-data="{ open: false }"><button @click="open = !open" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-gray-100"><div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center"><span class="text-indigo-600 font-semibold text-sm" x-text="getUserInitials()"></span></div><div class="hidden md:block text-left"><p class="text-sm font-medium text-gray-700" x-text="user.email"></p></div></button><div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-200"><div class="px-4 py-3 border-b border-gray-200"><p class="text-sm font-medium text-gray-900" x-text="user.email"></p><p class="text-xs text-gray-600" x-text="user.tenantName"></p></div><div class="pt-2"><button @click="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-3"></i> Sign Out</button></div></div></div></div></div></div></nav>

        <!-- Breadcrumbs -->
        <div class="bg-white border-b border-gray-200 px-6 py-3"><div class="flex items-center space-x-2 text-sm mb-2"><template x-for="(crumb, i) in breadcrumbItems" :key="i"><span class="flex items-center space-x-2"><span x-show="i > 0"><i class="fas fa-chevron-right text-gray-400 text-xs"></i></span><a x-show="crumb.path" :href="crumb.path" class="text-gray-500 hover:text-blue-600" x-text="crumb.label"></a><span x-show="!crumb.path" class="text-gray-900 font-medium" x-text="crumb.label"></span></span></template></div><div class="flex items-center space-x-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-chart-line text-white"></i></div><div><h1 class="text-lg font-bold text-gray-900" x-text="entityContext.displayName"></h1></div></div></div>

        <!-- Main Layout -->
        <div class="flex h-[calc(100vh-132px)]">
            <div class="sidebar flex flex-col" role="navigation"><nav class="flex-1 p-3 space-y-3"><template x-for="group in sidebarGroups" :key="group.label"><div><div class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-1" x-text="group.label"></div><template x-for="item in group.items" :key="item.page"><div @click="navigateTo(item.page)" :class="{'active': currentPage === item.page}" class="nav-item flex items-center px-3 py-2.5 rounded-lg cursor-pointer"><i :class="item.icon" class="w-5 text-gray-400"></i><span class="ml-3 text-sm font-medium" x-text="item.name"></span><span x-show="item.badge && $data[item.badge] > 0" class="badge" x-text="$data[item.badge]"></span></div></template></div></template></nav><div class="p-4 border-t border-gray-200"><p class="text-xs text-gray-400 mb-2">Keyboard Shortcuts</p><div class="space-y-1 text-xs text-gray-500"><template x-for="item in sidebarGroups.flatMap(g => g.items).filter(i => i.shortcut)" :key="item.shortcut"><div><span x-text="'⌘' + item.shortcut + ' - ' + item.name"></span></div></template></div></div></div>

            <div class="flex-1 overflow-auto">
                <div class="fade-in p-8"><div class="max-w-7xl mx-auto space-y-6">
                    <!-- Loading -->
                    <div x-show="provocationsLoading" class="text-center py-12">
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><i class="fas fa-bolt text-2xl text-red-600"></i></div>
                        <h3 class="text-lg font-semibold text-gray-900">Generating Provocations...</h3>
                    </div>
                    <!-- Empty -->
                    <div x-show="!provocationsLoading && provocationsData.length === 0" class="text-center py-12">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-bolt text-2xl text-gray-400"></i></div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-2">No Provocations Yet</h3>
                        <p class="text-gray-600 mb-4">Ask 3+ research questions to auto-generate, or click below.</p>
                        <button @click="loadProvocations(true)" class="px-6 py-2 bg-gradient-to-r from-red-600 to-orange-600 text-white rounded-lg font-medium"><i class="fas fa-bolt mr-2"></i>Generate Now</button>
                    </div>
                    <!-- Provocations List -->
                    <template x-for="(prov, idx) in provocationsData.slice(0, 5)" :key="idx">
                        <div class="bg-white rounded-xl p-6 border-l-4" :class="{'border-red-500': prov.severity === 'RED_FLAG', 'border-amber-500': prov.severity === 'AMBER', 'border-green-500': prov.severity === 'GREEN_CHALLENGE'}">
                            <div class="flex items-start justify-between mb-3">
                                <h3 class="text-lg font-bold text-gray-900" x-text="prov.title"></h3>
                                <span class="px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap" :class="{'bg-red-100 text-red-800': prov.severity === 'RED_FLAG', 'bg-amber-100 text-amber-800': prov.severity === 'AMBER', 'bg-green-100 text-green-800': prov.severity === 'GREEN_CHALLENGE'}" x-text="prov.severity.replace('_', ' ')"></span>
                            </div>
                            <p class="text-gray-700 mb-3" x-text="prov.observation"></p>
                            <div x-show="prov.crossFilingDelta || prov.cross_filing_delta" class="bg-gray-50 rounded-lg p-3 mb-3"><p class="text-sm text-gray-600"><i class="fas fa-exchange-alt mr-1 text-blue-500"></i><span x-text="prov.crossFilingDelta || prov.cross_filing_delta"></span></p></div>
                            <p class="text-gray-600 text-sm mb-3"><strong>Implication:</strong> <span x-text="prov.implication"></span></p>
                            <div class="bg-blue-50 rounded-lg p-3 mb-3"><p class="text-sm font-medium text-blue-800"><i class="fas fa-question-circle mr-1"></i><span x-text="prov.challengeQuestion || prov.challenge_question"></span></p></div>
                            <div class="flex items-center justify-between">
                                <span class="text-xs text-gray-400" x-text="prov.category"></span>
                                <div class="flex items-center space-x-3">
                                    <button @click="saveProvocationToScratchpad(prov)" class="text-xs text-green-600 hover:text-green-800"><i class="fas fa-bookmark mr-1"></i>Save to Scratchpad</button>
                                    <button @click="askProvocationInResearch(prov)" class="text-xs text-blue-600 hover:text-blue-800"><i class="fas fa-comment mr-1"></i>Ask in Research</button>
                                </div>
                            </div>
                        </div>
                    </template>
                    <!-- Sentiment -->
                    <div x-show="!provocationsLoading && sentimentData" class="bg-white rounded-xl p-6 border border-gray-200">
                        <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-chart-line text-purple-600 mr-3"></i>Sentiment Trend</h3>
                        <template x-if="sentimentData && sentimentData.sentiments">
                            <div class="space-y-3">
                                <template x-for="(s, i) in sentimentData.sentiments" :key="i">
                                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                        <span class="text-sm font-medium" x-text="new Date(s.filingDate).toLocaleDateString()"></span>
                                        <div class="flex items-center space-x-3">
                                            <span class="text-sm" x-text="s.sentiment.label"></span>
                                            <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full rounded-full" :class="s.sentiment.score > 0 ? 'bg-green-500' : s.sentiment.score < 0 ? 'bg-red-500' : 'bg-gray-400'" :style="'width: ' + ((s.sentiment.score + 1) / 2 * 100) + '%'"></div></div>
                                            <span class="text-xs font-mono" x-text="s.sentiment.score.toFixed(2)"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div></div>
            </div>
        </div>
    </div>
</body>
</html>
