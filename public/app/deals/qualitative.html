<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - Qualitative Analysis</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/filing-notifications.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="_module-config.js"></script>
    <script src="/app/_shell.js"></script>
    <script src="/app/_utils.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover { background: #f9fafb; }
        .nav-item.active { background: #eff6ff; color: #1a56db; border-left: 3px solid #1a56db; }
        .nav-item.active i { color: #1a56db; }
        .badge { position: absolute; top: 8px; right: 8px; background: #dc2626; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .tenant-badge { background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%); }
        .qa-card { position: relative; background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem 1.5rem; transition: all 0.2s; }
        .qa-card:hover { border-color: #93c5fd; }
        .qa-card.cached { border-left: 3px solid #22c55e; }
        .citation-link { color: #2563eb; text-decoration: none; font-weight: 500; padding: 0 2px; border-radius: 2px; cursor: pointer; }
        .citation-link:hover { background-color: #dbeafe; color: #1e40af; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
    window.FundLensQualitativeView = function() {
        return {
            loadingQualitative: true,
            refreshingQualitative: false,
            refreshQualitativeStatus: '',
            qualitativeData: {},
            qualitativeHasData: false,
            _autoTriggerFired: false,
            showSourceModal: false,
            sourceModal: { sourceType: 'SEC_FILING', filename: '', ticker: '', filingType: '', fiscalPeriod: '', section: '', pageNumber: null, excerpt: '', relevanceScore: null },
            currentCitations: [],
            _qualitativeSectionMeta: {
                managementCredibility: { title: 'Management Credibility & Alignment', subtitle: 'Guidance accuracy, insider transactions, skin in the game', icon: 'fas fa-user-shield text-blue-600', gradient: 'bg-gradient-to-r from-blue-50 to-indigo-50', badge: 'bg-blue-50 text-blue-700' },
                balanceSheetProtection: { title: 'Balance Sheet & Downside Protection', subtitle: 'Off-balance sheet exposure, debt covenants, capital structure', icon: 'fas fa-shield-alt text-red-600', gradient: 'bg-gradient-to-r from-red-50 to-orange-50', badge: 'bg-red-50 text-red-700' },
                capitalAllocation: { title: 'Capital Allocation & Shareholder Value', subtitle: 'FCF deployment, M&A track record, implied returns', icon: 'fas fa-coins text-green-600', gradient: 'bg-gradient-to-r from-green-50 to-emerald-50', badge: 'bg-green-50 text-green-700' },
                earningsQuality: { title: 'Earnings Quality & Accounting Risk', subtitle: 'Accruals check, accounting policy changes, cash flow divergence', icon: 'fas fa-search-dollar text-purple-600', gradient: 'bg-gradient-to-r from-purple-50 to-violet-50', badge: 'bg-purple-50 text-purple-700' },
                competitiveRisk: { title: 'Competitive Position & Risk Factors', subtitle: 'Risk factor diffs, earnings call deflections, emerging threats', icon: 'fas fa-exclamation-triangle text-amber-600', gradient: 'bg-gradient-to-r from-amber-50 to-yellow-50', badge: 'bg-amber-50 text-amber-700' },
                _default: { title: 'Analysis', subtitle: '', icon: 'fas fa-chart-bar text-gray-600', gradient: 'bg-gradient-to-r from-gray-50 to-slate-50', badge: 'bg-gray-50 text-gray-700' },
            },

            _checkQualitativeData(data) {
                if (!data || typeof data !== 'object') return false;
                var keys = Object.keys(data);
                return keys.length > 0 && keys.some(function(k) { return Array.isArray(data[k]) && data[k].length > 0; });
            },

            async init() {
                await this.loadQualitativeData();
                document.addEventListener('citation-click', (e) => { this.handleCitationClickByNumber(e.detail.num); });
            },

            async loadQualitativeData() {
                this.loadingQualitative = true;
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) { this.loadingQualitative = false; return; }
                    var ticker = this.entityContext.value;
                    var resp = await fetch('/api/financial-calculator/qualitative/' + ticker, { headers: headers });
                    if (resp.status === 401) { window.location.href = '/login.html'; return; }
                    var result = await resp.json();
                    if (result.success && result.data) {
                        this.qualitativeData = FundLensUtils.deepCopy(result.data.categories || {});
                        this.qualitativeHasData = this._checkQualitativeData(this.qualitativeData);
                    }
                } catch (e) { console.error('Error loading qualitative data:', e); }
                finally { this.loadingQualitative = false; }
                if (!this.qualitativeHasData && !this._autoTriggerFired) {
                    this._autoTriggerFired = true;
                    this.refreshQualitativeData();
                }
            },

            async refreshQualitativeData() {
                var ticker = this.entityContext.value;
                if (!ticker || this.refreshingQualitative) return;
                this.refreshingQualitative = true;
                this.refreshQualitativeStatus = 'Starting regeneration...';
                var headers = this.getAuthHeaders();
                if (!headers) { this.refreshingQualitative = false; return; }
                fetch('/api/financial-calculator/qualitative/precompute/' + ticker, { method: 'POST', headers: headers }).catch(function() {});
                var self = this;
                var attempt = 0;
                var poll = async function() {
                    attempt++;
                    try {
                        var statusRes = await fetch('/api/financial-calculator/qualitative/status/' + ticker, { headers: headers });
                        var status = await statusRes.json();
                        var entries = status.data?.cachedEntries || 0;
                        if (status.data?.readyForInstantLoad) {
                            self.refreshQualitativeStatus = 'Loading fresh data...';
                            var resp = await fetch('/api/financial-calculator/qualitative/' + ticker, { headers: headers });
                            var result = await resp.json();
                            if (result.success && result.data) {
                                self.qualitativeData = FundLensUtils.deepCopy(result.data.categories || {});
                                self.qualitativeHasData = self._checkQualitativeData(self.qualitativeData);
                            }
                            self.refreshingQualitative = false;
                            self.refreshQualitativeStatus = '';
                            return;
                        }
                        if (attempt >= 60) { self.refreshingQualitative = false; self.refreshQualitativeStatus = ''; return; }
                        self.refreshQualitativeStatus = 'Regenerating... (' + entries + ' of ~10 answers)';
                        setTimeout(poll, 5000);
                    } catch (e) { if (attempt < 60) setTimeout(poll, 5000); else { self.refreshingQualitative = false; self.refreshQualitativeStatus = ''; } }
                };
                setTimeout(poll, 3000);
            },

            renderMarkdown(text) {
                if (!text) return '';
                try { return marked.parse(text); } catch (e) { return text; }
            },

            renderMarkdownWithCitations(content, citations) {
                if (!citations || citations.length === 0) return this.renderMarkdown(content);
                this.currentCitations = citations;
                var html = this.renderMarkdown(content);
                citations.forEach(function(c) {
                    var num = c.number || c.citationNumber;
                    if (!num) return;
                    var st = c.sourceType || 'SEC_FILING';
                    var cls = st === 'USER_UPLOAD' ? 'citation-link citation-upload' : 'citation-link citation-sec';
                    html = html.replace(new RegExp('\\[' + num + '\\]', 'g'),
                        '<a href="#" class="' + cls + '" onclick="event.preventDefault(); document.dispatchEvent(new CustomEvent(\'citation-click\', {detail: {num: ' + num + '}}));">[' + num + ']</a>');
                });
                return html;
            },

            handleCitationClickByNumber(num) {
                var c = (this.currentCitations || []).find(function(x) { return x.number === num || x.citationNumber === num; });
                if (!c) return;
                this.sourceModal = {
                    sourceType: c.sourceType || 'SEC_FILING', filename: c.filename || '',
                    ticker: c.ticker || '', filingType: c.filingType || '', fiscalPeriod: c.fiscalPeriod || '',
                    section: c.section || '', pageNumber: c.pageNumber || null,
                    excerpt: c.excerpt || '', relevanceScore: c.relevanceScore || c.score || null
                };
                this.showSourceModal = true;
            }
        };
    };
    </script>
</head>
<body class="bg-gray-50">
    <div x-data="FundLensShell('qualitative', FundLensQualitativeView())" x-init="init()" x-cloak>

        <!-- Nav Bar -->
        <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><div class="flex items-center space-x-4"><a href="/app/deals/index.html" class="flex items-center"><div class="bg-white px-3 py-1 rounded-lg"><img src="/fundlens-logo.png" alt="FundLens" class="h-8 w-auto"></div></a><div class="hidden sm:flex items-center"><span class="text-gray-300 mx-3">|</span><div class="tenant-badge px-3 py-1 rounded-full"><span class="text-white text-sm font-medium" x-text="user.tenantName || 'Loading...'"></span></div><div x-show="user.isPlatformAdmin" class="ml-2 px-2 py-1 rounded-full bg-yellow-500"><span class="text-white text-xs font-bold">PLATFORM ADMIN</span></div></div></div><div class="flex items-center space-x-4"><div class="relative"><button @click="filingNotifOpen = !filingNotifOpen" class="filing-notif-bell"><i class="fas fa-bell"></i><span x-show="filingNotifCount > 0" class="filing-notif-badge" x-text="filingNotifCount > 99 ? '99+' : filingNotifCount"></span></button><div x-show="filingNotifOpen" @click.away="filingNotifOpen = false" x-transition class="filing-notif-dropdown"><div class="filing-notif-header"><h3>New Filings</h3><button x-show="filingNotifications.length > 0" @click="dismissAllFilingNotifs()" class="filing-notif-dismiss-all">Dismiss All</button></div><div class="filing-notif-list"><template x-if="filingNotifications.length === 0"><div class="filing-notif-empty"><i class="fas fa-check-circle"></i><p>No new filings</p></div></template><template x-for="notif in filingNotifications" :key="notif.id"><div class="filing-notif-card"><span class="filing-type-badge" :class="getFilingTypeBadgeClass(notif.filingType)" x-text="notif.filingType"></span><div class="filing-notif-content"><div class="filing-notif-ticker" x-text="notif.ticker"></div><div class="filing-notif-date" x-text="formatFilingDate(notif.filingDate)"></div></div><button @click.stop="dismissFilingNotif(notif.id)" class="filing-notif-dismiss"><i class="fas fa-times"></i></button></div></template></div></div></div><div class="relative" x-data="{ open: false }"><button @click="open = !open" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-gray-100"><div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center"><span class="text-indigo-600 font-semibold text-sm" x-text="getUserInitials()"></span></div><div class="hidden md:block text-left"><p class="text-sm font-medium text-gray-700" x-text="user.email"></p><p class="text-xs text-gray-500 capitalize" x-text="user.role"></p></div><i class="fas fa-chevron-down text-gray-400 text-xs"></i></button><div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-200"><div class="px-4 py-3 border-b border-gray-200"><p class="text-sm font-medium text-gray-900" x-text="user.email"></p><p class="text-xs text-gray-600" x-text="user.tenantName"></p></div><div class="pt-2"><button @click="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-3"></i> Sign Out</button></div></div></div></div></div></div></nav>

        <!-- Breadcrumbs -->
        <div class="bg-white border-b border-gray-200 px-6 py-3"><div class="flex items-center space-x-2 text-sm mb-2"><template x-for="(crumb, i) in breadcrumbItems" :key="i"><span class="flex items-center space-x-2"><span x-show="i > 0"><i class="fas fa-chevron-right text-gray-400 text-xs"></i></span><a x-show="crumb.path" :href="crumb.path" class="text-gray-500 hover:text-blue-600" x-text="crumb.label"></a><span x-show="!crumb.path" class="text-gray-900 font-medium" x-text="crumb.label"></span></span></template></div><div class="flex items-center space-x-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-chart-line text-white"></i></div><div><h1 class="text-lg font-bold text-gray-900" x-text="entityContext.displayName"></h1><p class="text-xs text-gray-500" x-text="entityContext.extra.sector" x-show="entityContext.extra.sector"></p></div></div></div>

        <!-- Main Layout -->
        <div class="flex h-[calc(100vh-132px)]">
            <div class="sidebar flex flex-col" role="navigation"><nav class="flex-1 p-3 space-y-3"><template x-for="group in sidebarGroups" :key="group.label"><div><div class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-1" x-text="group.label"></div><template x-for="item in group.items" :key="item.page"><div @click="navigateTo(item.page)" :class="{'active': currentPage === item.page}" class="nav-item flex items-center px-3 py-2.5 rounded-lg cursor-pointer"><i :class="item.icon" class="w-5 text-gray-400"></i><span class="ml-3 text-sm font-medium" x-text="item.name"></span><span x-show="item.badge && $data[item.badge] > 0" class="badge" x-text="$data[item.badge]"></span></div></template></div></template></nav><div class="p-4 border-t border-gray-200"><p class="text-xs text-gray-400 mb-2">Keyboard Shortcuts</p><div class="space-y-1 text-xs text-gray-500"><template x-for="item in sidebarGroups.flatMap(g => g.items).filter(i => i.shortcut)" :key="item.shortcut"><div><span x-text="'⌘' + item.shortcut + ' - ' + item.name"></span></div></template></div></div></div>

            <!-- Content Area -->
            <div class="flex-1 overflow-auto">
                <div class="fade-in p-8"><div class="max-w-7xl mx-auto space-y-4">
                    <div x-show="!loadingQualitative" class="flex items-center justify-between"><div></div><button @click="refreshQualitativeData()" :disabled="refreshingQualitative" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-colors" :class="refreshingQualitative ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50'"><i class="fas fa-sync-alt" :class="refreshingQualitative && 'animate-spin'"></i><span x-text="refreshingQualitative ? (refreshQualitativeStatus || 'Regenerating...') : 'Refresh'"></span></button></div>
                    <div x-show="loadingQualitative" class="text-center py-12"><div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><i class="fas fa-brain text-2xl text-purple-600"></i></div><h3 class="text-lg font-semibold text-gray-900">Querying Knowledge Base...</h3><p class="text-gray-500 mt-2">Analyzing SEC filings for qualitative insights</p></div>
                    <div x-show="!loadingQualitative && !qualitativeHasData" class="text-center py-16 px-8"><div class="max-w-lg mx-auto"><div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl flex items-center justify-center mx-auto mb-6"><i class="fas fa-microscope text-3xl text-indigo-600"></i></div><h3 class="text-xl font-bold text-gray-900 mb-2">Deep Value Analysis Initializing</h3><p class="text-gray-500 text-sm mb-6">FundLens is generating institutional-grade equity research questions.</p><div class="inline-flex items-center gap-3 px-5 py-3 bg-indigo-50 rounded-xl text-sm text-indigo-700 font-medium"><svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span x-text="refreshQualitativeStatus || 'Starting deep value analysis...'"></span></div></div></div>
                    <div x-show="!loadingQualitative && qualitativeHasData && refreshingQualitative" class="bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 flex items-center gap-3"><svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="text-sm text-indigo-700" x-text="refreshQualitativeStatus || 'Regenerating analysis...'"></span></div>
                    <template x-for="catKey in Object.keys(qualitativeData || {})" :key="catKey">
                        <div x-show="!loadingQualitative && qualitativeData[catKey] && qualitativeData[catKey].length > 0" class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-200" :class="(_qualitativeSectionMeta[catKey] || _qualitativeSectionMeta._default).gradient"><h3 class="text-lg font-bold flex items-center text-gray-900"><i class="mr-3" :class="(_qualitativeSectionMeta[catKey] || _qualitativeSectionMeta._default).icon"></i><span x-text="(_qualitativeSectionMeta[catKey] || _qualitativeSectionMeta._default).title || catKey"></span></h3><p class="text-xs text-gray-500 mt-1" x-text="(_qualitativeSectionMeta[catKey] || _qualitativeSectionMeta._default).subtitle || ''"></p></div>
                            <div class="p-6 space-y-3">
                                <template x-for="(qa, idx) in qualitativeData[catKey]" :key="catKey + '-' + idx">
                                    <div x-data="{ expanded: false }" class="qa-card" :class="{ 'cached': qa.cached }">
                                        <span x-show="qa.cached" class="absolute top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded">⚡ Instant</span>
                                        <div class="flex items-center justify-between cursor-pointer" @click="expanded = !expanded"><p class="font-semibold text-gray-900 pr-4" x-text="qa.question"></p><i class="fas transition-transform duration-200 text-gray-400 flex-shrink-0" :class="expanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i></div>
                                        <div x-show="expanded" style="transition: all 0.2s ease-in-out;">
                                            <div class="message-assistant text-sm mt-3 border-0 shadow-none p-0 max-w-none" x-html="renderMarkdownWithCitations(qa.answer, qa.sources)"></div>
                                            <div x-show="qa.sources && qa.sources.length > 0" class="mt-4 flex flex-wrap gap-2"><template x-for="source in (qa.sources || [])" :key="(source.number || source.section || '') + idx"><span class="text-xs px-3 py-1 rounded-full" :class="(_qualitativeSectionMeta[catKey] || _qualitativeSectionMeta._default).badge"><i class="fas fa-file-alt mr-1"></i><span x-text="(source.section || '') + ' · ' + (source.filingType || '') + ' ' + (source.fiscalPeriod || '')"></span></span></template></div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div></div>
            </div>
        </div>

        <!-- Source Modal -->
        <div x-show="showSourceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="showSourceModal = false">
            <div class="bg-white rounded-xl shadow-xl max-w-lg w-full mx-4 p-6">
                <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">Source Citation</h3><button @click="showSourceModal = false" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
                <div class="space-y-3 text-sm">
                    <div x-show="sourceModal.ticker"><span class="font-medium">Ticker:</span> <span x-text="sourceModal.ticker"></span></div>
                    <div x-show="sourceModal.filingType"><span class="font-medium">Filing:</span> <span x-text="sourceModal.filingType + ' ' + sourceModal.fiscalPeriod"></span></div>
                    <div x-show="sourceModal.section"><span class="font-medium">Section:</span> <span x-text="sourceModal.section"></span></div>
                    <div x-show="sourceModal.excerpt" class="bg-gray-50 rounded-lg p-3 text-xs text-gray-700 max-h-48 overflow-auto" x-text="sourceModal.excerpt"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
