<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - Export</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/filing-notifications.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="_module-config.js"></script>
    <script src="/app/_shell.js"></script>
    <script src="/app/_utils.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover { background: #f9fafb; }
        .nav-item.active { background: #eff6ff; color: #1a56db; border-left: 3px solid #1a56db; }
        .nav-item.active i { color: #1a56db; }
        .badge { position: absolute; top: 8px; right: 8px; background: #dc2626; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .tenant-badge { background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
    window.FundLensExportView = function() {
        return {
            exportStep: 1,
            exportSelectedYear: null,
            exportFilingType: null,
            availablePeriods: { annualPeriods: [], quarterlyPeriods: [], has8KFilings: false },
            selectedYears: [],
            selectedQuarterYear: null,
            selectedQuarters: [],
            selectedStatements: ['income_statement', 'balance_sheet', 'cash_flow'],
            includeCalculatedMetrics: true,
            exportLoading: false,
            exportError: null,

            async init() { await this.loadAvailablePeriods(); },

            async loadAvailablePeriods() {
                var ticker = this.entityContext.value;
                if (!ticker) return;
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) return;
                    var resp = await fetch('/api/deals/export/by-ticker/' + ticker + '/available-periods', { headers: headers });
                    if (resp.status === 401) { window.location.href = '/login.html'; return; }
                    var result = await resp.json();
                    this.availablePeriods = result;
                    this.exportStep = 1;
                    this.exportSelectedYear = null;
                    this.exportFilingType = null;
                    this.selectedYears = [];
                    this.selectedQuarters = [];
                    if (result.quarterlyPeriods && result.quarterlyPeriods.length > 0) this.selectedQuarterYear = result.quarterlyPeriods[0].year;
                } catch (e) { console.error('Failed to load available periods:', e); }
            },

            goToExportStep(step) { this.exportStep = step; },
            selectExportYear(year) { this.exportSelectedYear = year; this.selectedYears = [year]; this.selectedQuarterYear = year; },
            selectFilingType(type) { this.exportFilingType = type; if (type === '10-Q') this.selectedQuarters = this.getQuartersForSelectedYear(); },

            getAvailableYears() {
                var years = new Set();
                if (this.availablePeriods.annualPeriods) this.availablePeriods.annualPeriods.forEach(function(p) { var m = p.match(/(\d{4})/); if (m) years.add(m[1]); });
                if (this.availablePeriods.quarterlyPeriods) this.availablePeriods.quarterlyPeriods.forEach(function(qp) { years.add(qp.year); });
                return Array.from(years).sort(function(a, b) { return b - a; });
            },
            hasAnnualDataForYear() { return this.exportSelectedYear && this.availablePeriods.annualPeriods && this.availablePeriods.annualPeriods.some(p => p.includes(this.exportSelectedYear)); },
            hasQuarterlyDataForYear() { return this.exportSelectedYear && this.availablePeriods.quarterlyPeriods && this.availablePeriods.quarterlyPeriods.some(qp => qp.year === this.exportSelectedYear); },
            getQuarterCountForYear() { var yd = (this.availablePeriods.quarterlyPeriods || []).find(qp => qp.year === this.exportSelectedYear); return yd ? yd.quarters.length : 0; },
            getQuartersForSelectedYear() { var yd = (this.availablePeriods.quarterlyPeriods || []).find(qp => qp.year === this.exportSelectedYear); return yd ? yd.quarters : []; },
            selectAllQuarters() { this.selectedQuarters = [...this.getQuartersForSelectedYear()]; },
            canExport() {
                if (!this.entityContext.value || this.selectedStatements.length === 0) return false;
                if (this.exportFilingType === '10-K') return this.selectedYears.length > 0;
                if (this.exportFilingType === '10-Q') return this.exportSelectedYear && this.selectedQuarters.length > 0;
                return false;
            },

            async executeExport() {
                if (!this.canExport()) return;
                this.exportLoading = true; this.exportError = null;
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) { this.exportLoading = false; return; }
                    var ticker = this.entityContext.value;
                    var resp = await fetch('/api/deals/export/by-ticker/' + ticker + '/excel', {
                        method: 'POST', headers: headers,
                        body: JSON.stringify({
                            filingType: this.exportFilingType,
                            exportMode: this.exportFilingType === '10-K' ? 'annual' : 'quarterly',
                            years: this.exportFilingType === '10-K' ? this.selectedYears.map(y => parseInt(y)) : [parseInt(this.exportSelectedYear)],
                            quarters: this.exportFilingType === '10-Q' ? this.selectedQuarters : undefined,
                            statements: this.selectedStatements,
                            includeCalculatedMetrics: this.includeCalculatedMetrics
                        })
                    });
                    if (!resp.ok) { var err = await resp.json().catch(() => ({})); throw new Error(err.message || 'Export failed'); }
                    var cd = resp.headers.get('Content-Disposition');
                    var filename = ticker + '_Financial_Statements.xlsx';
                    if (cd) { var m = cd.match(/filename="?([^"]+)"?/); if (m) filename = m[1]; }
                    var blob = await resp.blob();
                    var url = window.URL.createObjectURL(blob);
                    var a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); a.remove();
                } catch (e) { this.exportError = e.message || 'Failed to generate export.'; }
                finally { this.exportLoading = false; }
            }
        };
    };
    </script>
</head>
<body class="bg-gray-50">
    <div x-data="FundLensShell('export', FundLensExportView())" x-init="init()" x-cloak>

        <!-- Nav Bar -->
        <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><div class="flex items-center space-x-4"><a href="/app/deals/index.html" class="flex items-center"><div class="bg-white px-3 py-1 rounded-lg"><img src="/fundlens-logo.png" alt="FundLens" class="h-8 w-auto"></div></a><div class="hidden sm:flex items-center"><span class="text-gray-300 mx-3">|</span><div class="tenant-badge px-3 py-1 rounded-full"><span class="text-white text-sm font-medium" x-text="user.tenantName || 'Loading...'"></span></div><div x-show="user.isPlatformAdmin" class="ml-2 px-2 py-1 rounded-full bg-yellow-500"><span class="text-white text-xs font-bold">PLATFORM ADMIN</span></div></div></div><div class="flex items-center space-x-4"><div class="relative"><button @click="filingNotifOpen = !filingNotifOpen" class="filing-notif-bell"><i class="fas fa-bell"></i><span x-show="filingNotifCount > 0" class="filing-notif-badge" x-text="filingNotifCount > 99 ? '99+' : filingNotifCount"></span></button><div x-show="filingNotifOpen" @click.away="filingNotifOpen = false" x-transition class="filing-notif-dropdown"><div class="filing-notif-header"><h3>New Filings</h3><button x-show="filingNotifications.length > 0" @click="dismissAllFilingNotifs()" class="filing-notif-dismiss-all">Dismiss All</button></div><div class="filing-notif-list"><template x-if="filingNotifications.length === 0"><div class="filing-notif-empty"><i class="fas fa-check-circle"></i><p>No new filings</p></div></template><template x-for="notif in filingNotifications" :key="notif.id"><div class="filing-notif-card"><span class="filing-type-badge" :class="getFilingTypeBadgeClass(notif.filingType)" x-text="notif.filingType"></span><div class="filing-notif-content"><div class="filing-notif-ticker" x-text="notif.ticker"></div><div class="filing-notif-date" x-text="formatFilingDate(notif.filingDate)"></div></div><button @click.stop="dismissFilingNotif(notif.id)" class="filing-notif-dismiss"><i class="fas fa-times"></i></button></div></template></div></div></div><div class="relative" x-data="{ open: false }"><button @click="open = !open" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-gray-100"><div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center"><span class="text-indigo-600 font-semibold text-sm" x-text="getUserInitials()"></span></div><div class="hidden md:block text-left"><p class="text-sm font-medium text-gray-700" x-text="user.email"></p><p class="text-xs text-gray-500 capitalize" x-text="user.role"></p></div><i class="fas fa-chevron-down text-gray-400 text-xs"></i></button><div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-200"><div class="px-4 py-3 border-b border-gray-200"><p class="text-sm font-medium text-gray-900" x-text="user.email"></p><p class="text-xs text-gray-600" x-text="user.tenantName"></p></div><div class="pt-2"><button @click="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-3"></i> Sign Out</button></div></div></div></div></div></div></nav>

        <!-- Breadcrumbs -->
        <div class="bg-white border-b border-gray-200 px-6 py-3"><div class="flex items-center space-x-2 text-sm mb-2"><template x-for="(crumb, i) in breadcrumbItems" :key="i"><span class="flex items-center space-x-2"><span x-show="i > 0"><i class="fas fa-chevron-right text-gray-400 text-xs"></i></span><a x-show="crumb.path" :href="crumb.path" class="text-gray-500 hover:text-blue-600" x-text="crumb.label"></a><span x-show="!crumb.path" class="text-gray-900 font-medium" x-text="crumb.label"></span></span></template></div><div class="flex items-center space-x-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-chart-line text-white"></i></div><div><h1 class="text-lg font-bold text-gray-900" x-text="entityContext.displayName"></h1><p class="text-xs text-gray-500" x-text="entityContext.extra.sector" x-show="entityContext.extra.sector"></p></div></div></div>

        <!-- Main Layout -->
        <div class="flex h-[calc(100vh-132px)]">
            <!-- Sidebar -->
            <div class="sidebar flex flex-col" role="navigation"><nav class="flex-1 p-3 space-y-3"><template x-for="group in sidebarGroups" :key="group.label"><div><div class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-1" x-text="group.label"></div><template x-for="item in group.items" :key="item.page"><div @click="navigateTo(item.page)" :class="{'active': currentPage === item.page}" class="nav-item flex items-center px-3 py-2.5 rounded-lg cursor-pointer"><i :class="item.icon" class="w-5 text-gray-400"></i><span class="ml-3 text-sm font-medium" x-text="item.name"></span><span x-show="item.badge && $data[item.badge] > 0" class="badge" x-text="$data[item.badge]"></span></div></template></div></template></nav><div class="p-4 border-t border-gray-200"><p class="text-xs text-gray-400 mb-2">Keyboard Shortcuts</p><div class="space-y-1 text-xs text-gray-500"><template x-for="item in sidebarGroups.flatMap(g => g.items).filter(i => i.shortcut)" :key="item.shortcut"><div><span x-text="'⌘' + item.shortcut + ' - ' + item.name"></span></div></template></div></div></div>

            <!-- Content Area -->
            <div class="flex-1 overflow-auto">
                <div class="fade-in p-8"><div class="max-w-7xl mx-auto">
                    <div class="bg-white rounded-xl p-6 border border-gray-200">
                        <div class="flex justify-between items-center mb-6">
                            <div><h2 class="text-2xl font-bold text-gray-900">Export Financial Statements</h2><p class="text-gray-600">Export comprehensive financial data to Excel</p></div>
                        </div>

                        <!-- Wizard Progress -->
                        <div class="mb-8"><div class="flex items-center justify-between">
                            <div class="flex items-center"><div :class="exportStep >= 1 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'" class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">1</div><span class="ml-2 text-sm font-medium" :class="exportStep >= 1 ? 'text-indigo-600' : 'text-gray-400'">Select Year</span></div>
                            <div class="flex-1 h-1 mx-4" :class="exportStep >= 2 ? 'bg-indigo-600' : 'bg-gray-200'"></div>
                            <div class="flex items-center"><div :class="exportStep >= 2 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'" class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">2</div><span class="ml-2 text-sm font-medium" :class="exportStep >= 2 ? 'text-indigo-600' : 'text-gray-400'">Filing Type</span></div>
                            <div class="flex-1 h-1 mx-4" :class="exportStep >= 3 ? 'bg-indigo-600' : 'bg-gray-200'"></div>
                            <div class="flex items-center"><div :class="exportStep >= 3 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'" class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">3</div><span class="ml-2 text-sm font-medium" :class="exportStep >= 3 ? 'text-indigo-600' : 'text-gray-400'">Export</span></div>
                        </div></div>

                        <!-- Step 1 -->
                        <div x-show="exportStep === 1" class="space-y-6">
                            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 rounded-xl p-6 border border-indigo-100">
                                <h3 class="text-lg font-semibold text-gray-900 mb-4"><i class="fas fa-calendar-alt mr-2 text-indigo-600"></i>Step 1: Select Year</h3>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                                    <template x-for="year in getAvailableYears()" :key="year">
                                        <button @click="selectExportYear(year)" :class="exportSelectedYear === year ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-200 hover:border-indigo-400'" class="px-4 py-3 rounded-xl font-medium border-2 text-center" x-text="year"></button>
                                    </template>
                                </div>
                                <div x-show="getAvailableYears().length === 0" class="text-center py-8 text-gray-500"><p>No data available.</p></div>
                            </div>
                            <div class="flex justify-end"><button @click="goToExportStep(2)" :disabled="!exportSelectedYear" :class="exportSelectedYear ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'" class="px-6 py-3 rounded-xl font-medium flex items-center">Next <i class="fas fa-arrow-right ml-2"></i></button></div>
                        </div>

                        <!-- Step 2 -->
                        <div x-show="exportStep === 2" class="space-y-6">
                            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 rounded-xl p-6 border border-indigo-100">
                                <h3 class="text-lg font-semibold text-gray-900 mb-4"><i class="fas fa-file-alt mr-2 text-indigo-600"></i>Step 2: Filing Type</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button @click="selectFilingType('10-K')" :disabled="!hasAnnualDataForYear()" :class="exportFilingType === '10-K' ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-600' : 'border-gray-200 hover:border-indigo-400'" class="p-6 rounded-xl border-2 text-left disabled:opacity-50">
                                        <div class="flex items-center mb-3"><div :class="exportFilingType === '10-K' ? 'bg-indigo-600' : 'bg-gray-400'" class="w-10 h-10 rounded-full flex items-center justify-center text-white"><i class="fas fa-file-alt"></i></div><span class="ml-3 font-semibold text-lg">10-K Annual</span></div>
                                        <p class="text-sm text-gray-600">Full year financial statements.</p>
                                    </button>
                                    <button @click="selectFilingType('10-Q')" :disabled="!hasQuarterlyDataForYear()" :class="exportFilingType === '10-Q' ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-600' : 'border-gray-200 hover:border-indigo-400'" class="p-6 rounded-xl border-2 text-left disabled:opacity-50">
                                        <div class="flex items-center mb-3"><div :class="exportFilingType === '10-Q' ? 'bg-indigo-600' : 'bg-gray-400'" class="w-10 h-10 rounded-full flex items-center justify-center text-white"><i class="fas fa-calendar-alt"></i></div><span class="ml-3 font-semibold text-lg">10-Q Quarterly</span></div>
                                        <p class="text-sm text-gray-600">Quarterly financial statements.</p>
                                    </button>
                                </div>
                            </div>
                            <div class="flex justify-between">
                                <button @click="goToExportStep(1)" class="px-6 py-3 rounded-xl bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center"><i class="fas fa-arrow-left mr-2"></i>Back</button>
                                <button @click="goToExportStep(3)" :disabled="!exportFilingType" :class="exportFilingType ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'" class="px-6 py-3 rounded-xl font-medium flex items-center">Next <i class="fas fa-arrow-right ml-2"></i></button>
                            </div>
                        </div>

                        <!-- Step 3 -->
                        <div x-show="exportStep === 3" class="space-y-6">
                            <div class="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-xl p-4 border border-emerald-200">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4"><div class="bg-emerald-100 p-2 rounded-lg"><i class="fas fa-check-circle text-emerald-600 text-xl"></i></div><div><p class="text-sm text-gray-600">Exporting</p><p class="font-semibold text-gray-900"><span x-text="entityContext.value"></span> • <span x-text="exportFilingType"></span> • <span x-text="exportSelectedYear"></span></p></div></div>
                                    <button @click="goToExportStep(1)" class="text-sm text-indigo-600 hover:text-indigo-800"><i class="fas fa-edit mr-1"></i>Change</button>
                                </div>
                            </div>
                            <div x-show="exportFilingType === '10-Q'" class="bg-white rounded-xl border border-gray-200 p-6">
                                <label class="block text-sm font-medium text-gray-700 mb-3">Select Quarters</label>
                                <div class="flex flex-wrap gap-3">
                                    <template x-for="quarter in getQuartersForSelectedYear()" :key="quarter">
                                        <label class="inline-flex items-center px-4 py-3 rounded-lg border cursor-pointer" :class="selectedQuarters.includes(quarter) ? 'bg-indigo-100 border-indigo-400' : 'bg-gray-50 border-gray-200'">
                                            <input type="checkbox" :value="quarter" x-model="selectedQuarters" class="rounded border-gray-300 text-indigo-600"><span class="ml-2 text-sm font-medium" x-text="quarter"></span>
                                        </label>
                                    </template>
                                </div>
                                <div class="mt-2"><button @click="selectAllQuarters()" class="text-sm text-indigo-600">Select All</button></div>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-200 p-6">
                                <label class="block text-sm font-medium text-gray-700 mb-3">Statements to Include</label>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <label class="flex items-center p-4 rounded-lg border cursor-pointer" :class="selectedStatements.includes('income_statement') ? 'bg-indigo-100 border-indigo-400' : 'bg-gray-50 border-gray-200'"><input type="checkbox" value="income_statement" x-model="selectedStatements" class="rounded border-gray-300 text-indigo-600"><div class="ml-3"><span class="font-medium text-gray-900">Income Statement</span></div></label>
                                    <label class="flex items-center p-4 rounded-lg border cursor-pointer" :class="selectedStatements.includes('balance_sheet') ? 'bg-indigo-100 border-indigo-400' : 'bg-gray-50 border-gray-200'"><input type="checkbox" value="balance_sheet" x-model="selectedStatements" class="rounded border-gray-300 text-indigo-600"><div class="ml-3"><span class="font-medium text-gray-900">Balance Sheet</span></div></label>
                                    <label class="flex items-center p-4 rounded-lg border cursor-pointer" :class="selectedStatements.includes('cash_flow') ? 'bg-indigo-100 border-indigo-400' : 'bg-gray-50 border-gray-200'"><input type="checkbox" value="cash_flow" x-model="selectedStatements" class="rounded border-gray-300 text-indigo-600"><div class="ml-3"><span class="font-medium text-gray-900">Cash Flow</span></div></label>
                                </div>
                            </div>
                            <div class="flex justify-between items-center pt-4 border-t">
                                <button @click="goToExportStep(2)" class="px-6 py-3 rounded-xl bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center"><i class="fas fa-arrow-left mr-2"></i>Back</button>
                                <button @click="executeExport()" :disabled="!canExport() || exportLoading" :class="canExport() && !exportLoading ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white hover:shadow-lg' : 'bg-gray-300 text-gray-500 cursor-not-allowed'" class="px-8 py-3 rounded-xl font-medium flex items-center">
                                    <template x-if="exportLoading"><span class="flex items-center"><svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Generating...</span></template>
                                    <template x-if="!exportLoading"><span><i class="fas fa-file-excel mr-2"></i>Export to Excel</span></template>
                                </button>
                            </div>
                            <div x-show="exportError" class="p-4 bg-red-50 border border-red-200 rounded-lg"><p class="text-red-700 text-sm" x-text="exportError"></p></div>
                        </div>
                    </div>
                </div></div>
            </div>
        </div>
    </div>
</body>
</html>
