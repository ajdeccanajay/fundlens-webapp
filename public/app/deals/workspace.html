<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FundLens - Redirecting...</title>
    <style>body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:system-ui;color:#6b7280;}p{text-align:center;}</style>
</head>
<body>
    <p><i>Redirecting...</i></p>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var hash = window.location.hash.substring(1);

        var redirectMap = {
            'research': 'research',
            'scratchpad': 'scratchpad',
            'ic-memo': 'ic-memo',
            'analysis': 'quantitative',
            'quantitative': 'quantitative',
            'qualitative': 'qualitative',
            'export': 'export',
            'provocations': 'provocations',
            '': 'quantitative'
        };

        var target = redirectMap[hash] || 'quantitative';
        window.location.replace(target + '.html?' + params.toString());
    })();
    </script>
</body>
</html>
