<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - IC Memo</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/filing-notifications.css">
    <link rel="stylesheet" href="/css/ic-memo.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="_module-config.js"></script>
    <script src="/app/_shell.js"></script>
    <script src="/app/_utils.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover { background: #f9fafb; }
        .nav-item.active { background: #eff6ff; color: #1a56db; border-left: 3px solid #1a56db; }
        .nav-item.active i { color: #1a56db; }
        .badge { position: absolute; top: 8px; right: 8px; background: #dc2626; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .tenant-badge { background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
    window.FundLensIcMemoView = function() {
        return {
            memoGenerated: false,
            memoGenerating: false,
            memoContent: '',
            memoRawContent: '',
            memoStatus: '',
            scratchpadItems: [],

            async init() { await this.loadScratchpadForMemo(); },

            async loadScratchpadForMemo() {
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) return;
                    var resp = await fetch('/api/research/notebooks', { headers: headers });
                    if (resp.ok) {
                        var result = await resp.json();
                        if (result.data && result.data.length > 0) {
                            var nbResp = await fetch('/api/research/notebooks/' + result.data[0].id, { headers: headers });
                            if (nbResp.ok) { var nbData = await nbResp.json(); this.scratchpadItems = (nbData.data.insights || []).map(function(i) { return { id: i.id, type: 'direct_answer', content: { text: i.content || '' }, savedAt: i.createdAt }; }); }
                        }
                    }
                } catch (e) { console.error('Error loading scratchpad for memo:', e); }
            },

            renderMarkdown(text) {
                if (!text) return '';
                try { if (typeof marked !== 'undefined') { marked.use({ breaks: false, gfm: true }); return marked.parse(text); } } catch(e) {}
                return text.replace(/\n/g, '<br>');
            },

            async generateMemo() {
                this.memoGenerating = true;
                this.memoContent = '';
                this.memoRawContent = '';
                this.memoStatus = 'Initializing...';
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) { this.memoGenerating = false; return; }
                    var ticker = this.entityContext.value;
                    if (!ticker) { alert('Ticker not found'); this.memoGenerating = false; return; }
                    var contentText = this.scratchpadItems.map(function(item) {
                        if (item.type === 'direct_answer') return item.content.text;
                        if (item.type === 'revenue_framework') { var pit = item.content.pointInTime.map(function(c) { return c.name; }).join(', '); var ot = item.content.overTime.map(function(c) { return c.name; }).join(', '); return "Revenue Framework:\nPoint-in-Time: " + pit + "\nOver-Time: " + ot; }
                        if (item.type === 'trend_analysis') { return item.content.metric + " Trend: " + item.content.data.map(function(d) { return d.year + ": " + d.value + "M (" + (d.yoyChange > 0 ? "+" : "") + d.yoyChange + "%)"; }).join(", "); }
                        if (item.type === 'provocation') return "Question: " + item.content.question;
                        return '';
                    }).filter(function(t) { return t; }).join("\n\n");
                    var response = await fetch('/api/deals/generate-memo', { method: 'POST', headers: headers, body: JSON.stringify({ ticker: ticker, content: contentText || "No scratchpad content available. Generate a comprehensive investment memo based on available SEC filing data.", structure: "standard", voiceTone: "professional" }) });
                    if (response.status === 401) { localStorage.removeItem('fundlens_token'); window.location.href = '/login.html'; return; }
                    if (!response.ok) { var errorText = await response.text(); throw new Error("HTTP " + response.status + ": " + errorText); }
                    var reader = response.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = '';
                    var fullContent = '';
                    var self = this;
                    while (true) {
                        var result = await reader.read();
                        if (result.done) break;
                        buffer += decoder.decode(result.value, { stream: true });
                        var messages = buffer.split("\n\n");
                        buffer = messages.pop() || '';
                        for (var i = 0; i < messages.length; i++) {
                            var message = messages[i];
                            if (!message.trim() || !message.startsWith("data: ")) continue;
                            try {
                                var data = JSON.parse(message.substring(6));
                                if (data.status === 'error') throw new Error(data.error || data.message || "Failed to generate memo");
                                if (data.message) self.memoStatus = data.message;
                                if (data.type === 'content' && data.content) { fullContent += data.content; self.memoRawContent = fullContent; self.memoContent = self.renderMarkdown(fullContent); }
                                if (data.status === 'complete') self.memoGenerated = true;
                                if (data.data && data.data.content) { fullContent = data.data.content; self.memoRawContent = fullContent; self.memoContent = self.renderMarkdown(fullContent); self.memoGenerated = true; }
                            } catch (pe) { if (pe.message && pe.message.includes('Failed to generate')) throw pe; console.error("Error parsing SSE:", pe); }
                        }
                    }
                    if (fullContent) this.memoGenerated = true;
                    else throw new Error("No content received from memo generation");
                } catch (error) { console.error("Error generating memo:", error); alert("Error generating memo: " + error.message); }
                finally { this.memoGenerating = false; }
            },

            async downloadMemoPDF() {
                try {
                    // Client-side PDF via browser print — no server endpoint needed
                    var printWindow = window.open('', '_blank');
                    printWindow.document.write('<!DOCTYPE html><html><head><title>IC Memo - ' + this.entityContext.value + '</title>');
                    printWindow.document.write('<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;color:#1a1a1a;line-height:1.6}h1,h2,h3{color:#1e3a5f}h1{font-size:24px;border-bottom:2px solid #1a56db;padding-bottom:8px}h2{font-size:20px;margin-top:28px;border-bottom:1px solid #e5e7eb;padding-bottom:6px}h3{font-size:16px;margin-top:20px}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{border:1px solid #d1d5db;padding:8px 12px;text-align:left;font-size:13px}th{background:#f3f4f6;font-weight:600}ul,ol{padding-left:24px}li{margin-bottom:4px}strong{color:#1e3a5f}@media print{body{margin:0;padding:20px}}</style>');
                    printWindow.document.write('</head><body>');
                    printWindow.document.write(document.querySelector('.ic-memo-container').innerHTML);
                    printWindow.document.write('</body></html>');
                    printWindow.document.close();
                    printWindow.focus();
                    setTimeout(function() { printWindow.print(); }, 500);
                } catch (error) { console.error("Error downloading PDF:", error); alert("Use your browser's Print > Save as PDF to export this memo."); }
            },

            async copyMemoToClipboard() {
                try { await navigator.clipboard.writeText(this.memoRawContent); alert("Memo copied to clipboard!"); }
                catch (e) { console.error("Copy failed:", e); }
            }
        };
    };
    </script>
</head>

<body class="bg-gray-50">
    <div x-data="FundLensShell('ic-memo', FundLensIcMemoView())" x-init="init()" x-cloak>

        <!-- Nav Bar -->
        <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><div class="flex items-center space-x-4"><a href="/app/deals/index.html" class="flex items-center"><div class="bg-white px-3 py-1 rounded-lg"><img src="/fundlens-logo.png" alt="FundLens" class="h-8 w-auto"></div></a><div class="hidden sm:flex items-center"><span class="text-gray-300 mx-3">|</span><div class="tenant-badge px-3 py-1 rounded-full"><span class="text-white text-sm font-medium" x-text="user.tenantName || 'Loading...'"></span></div></div></div><div class="flex items-center space-x-4"><div class="relative"><button @click="filingNotifOpen = !filingNotifOpen" class="filing-notif-bell"><i class="fas fa-bell"></i><span x-show="filingNotifCount > 0" class="filing-notif-badge" x-text="filingNotifCount > 99 ? '99+' : filingNotifCount"></span></button><div x-show="filingNotifOpen" @click.away="filingNotifOpen = false" x-transition class="filing-notif-dropdown"><div class="filing-notif-header"><h3>New Filings</h3></div><div class="filing-notif-list"><template x-if="filingNotifications.length === 0"><div class="filing-notif-empty"><i class="fas fa-check-circle"></i><p>No new filings</p></div></template><template x-for="notif in filingNotifications" :key="notif.id"><div class="filing-notif-card"><span class="filing-type-badge" :class="getFilingTypeBadgeClass(notif.filingType)" x-text="notif.filingType"></span><div class="filing-notif-content"><div class="filing-notif-ticker" x-text="notif.ticker"></div><div class="filing-notif-date" x-text="formatFilingDate(notif.filingDate)"></div></div><button @click.stop="dismissFilingNotif(notif.id)" class="filing-notif-dismiss"><i class="fas fa-times"></i></button></div></template></div></div></div><div class="relative" x-data="{ open: false }"><button @click="open = !open" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-gray-100"><div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center"><span class="text-indigo-600 font-semibold text-sm" x-text="getUserInitials()"></span></div><div class="hidden md:block text-left"><p class="text-sm font-medium text-gray-700" x-text="user.email"></p></div></button><div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-200"><div class="px-4 py-3 border-b border-gray-200"><p class="text-sm font-medium text-gray-900" x-text="user.email"></p><p class="text-xs text-gray-600" x-text="user.tenantName"></p></div><div class="pt-2"><button @click="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-3"></i> Sign Out</button></div></div></div></div></div></div></nav>

        <!-- Breadcrumbs -->
        <div class="bg-white border-b border-gray-200 px-6 py-3"><div class="flex items-center space-x-2 text-sm mb-2"><template x-for="(crumb, i) in breadcrumbItems" :key="i"><span class="flex items-center space-x-2"><span x-show="i > 0"><i class="fas fa-chevron-right text-gray-400 text-xs"></i></span><a x-show="crumb.path" :href="crumb.path" class="text-gray-500 hover:text-blue-600" x-text="crumb.label"></a><span x-show="!crumb.path" class="text-gray-900 font-medium" x-text="crumb.label"></span></span></template></div><div class="flex items-center space-x-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-chart-line text-white"></i></div><div><h1 class="text-lg font-bold text-gray-900" x-text="entityContext.displayName"></h1></div></div></div>

        <!-- Main Layout -->
        <div class="flex h-[calc(100vh-132px)]">
            <div class="sidebar flex flex-col" role="navigation"><nav class="flex-1 p-3 space-y-3"><template x-for="group in sidebarGroups" :key="group.label"><div><div class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-1" x-text="group.label"></div><template x-for="item in group.items" :key="item.page"><div @click="navigateTo(item.page)" :class="{'active': currentPage === item.page}" class="nav-item flex items-center px-3 py-2.5 rounded-lg cursor-pointer"><i :class="item.icon" class="w-5 text-gray-400"></i><span class="ml-3 text-sm font-medium" x-text="item.name"></span><span x-show="item.badge && $data[item.badge] > 0" class="badge" x-text="$data[item.badge]"></span></div></template></div></template></nav><div class="p-4 border-t border-gray-200"><p class="text-xs text-gray-400 mb-2">Keyboard Shortcuts</p><div class="space-y-1 text-xs text-gray-500"><template x-for="item in sidebarGroups.flatMap(g => g.items).filter(i => i.shortcut)" :key="item.shortcut"><div><span x-text="'⌘' + item.shortcut + ' - ' + item.name"></span></div></template></div></div></div>

            <!-- IC Memo Content -->
            <div class="flex-1 overflow-auto">
                <div class="fade-in p-8"><div class="max-w-4xl mx-auto">
                    <h1 class="text-2xl font-bold mb-6">Investment Committee Memo</h1>

                    <template x-if="memoGenerating">
                        <div>
                            <div class="bg-white rounded-xl p-6 border border-gray-200 mb-6">
                                <div class="flex items-center mb-4">
                                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 mr-3" style="border-color: #1a56db;"></div>
                                    <h2 class="text-lg font-semibold">Generating IC Memo — Section by Section</h2>
                                </div>
                                <p class="text-sm text-gray-600 mb-3" x-text="memoStatus"></p>
                                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                                    8 sections: Investment Thesis → Company Overview → Financial Analysis → Management → Variant Perception → Key Risks → Valuation → Catalysts
                                </div>
                            </div>
                            <template x-if="memoContent">
                                <div class="ic-memo-container" x-html="memoContent"></div>
                            </template>
                        </div>
                    </template>

                    <template x-if="!memoGenerated && !memoGenerating">
                        <div class="bg-white rounded-xl p-8 border border-gray-200 text-center">
                            <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6" style="background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);"><i class="fas fa-file-export text-3xl" style="color: #059669;"></i></div>
                            <h2 class="text-xl font-semibold mb-4">Generate IC Memo</h2>
                            <p class="text-gray-600 mb-6">Create a comprehensive investment memo using your research and analysis</p>
                            <div class="border border-blue-200 rounded-lg p-4 mb-6 text-left max-w-md mx-auto" style="background: #eff6ff;">
                                <h3 class="font-semibold mb-2" style="color: #1a56db;">8-Section IC Memo Template:</h3>
                                <ul class="text-sm space-y-1" style="color: #1a56db;">
                                    <li><i class="fas fa-check mr-2"></i>Investment Thesis</li>
                                    <li><i class="fas fa-check mr-2"></i>Company Overview</li>
                                    <li><i class="fas fa-check mr-2"></i>Financial Analysis (5-year trends)</li>
                                    <li><i class="fas fa-check mr-2"></i>Management & Governance</li>
                                    <li><i class="fas fa-check mr-2"></i>Variant Perception</li>
                                    <li><i class="fas fa-check mr-2"></i>Key Risks & Counter-Arguments</li>
                                    <li><i class="fas fa-check mr-2"></i>Valuation</li>
                                    <li><i class="fas fa-check mr-2"></i>Catalysts & Monitoring Plan</li>
                                </ul>
                                <p class="text-xs text-blue-600 mt-2">Includes your scratchpad notes (<span x-text="scratchpadCount"></span> items) + provocations + SEC filing data</p>
                            </div>
                            <button @click="generateMemo()" class="px-8 py-3 rounded-xl font-medium text-white hover:shadow-lg" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-magic mr-2"></i>Generate Memo</button>
                        </div>
                    </template>

                    <template x-if="memoGenerated">
                        <div>
                            <div class="ic-memo-container" x-html="memoContent"></div>
                            <div class="flex gap-3 mt-6">
                                <button @click="downloadMemoPDF()" class="flex-1 px-6 py-3 rounded-lg font-medium text-white" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-download mr-2"></i>Download PDF</button>
                                <button @click="copyMemoToClipboard()" class="flex-1 px-6 py-3 rounded-lg font-medium border border-gray-300 hover:bg-gray-50"><i class="fas fa-copy mr-2"></i>Copy to Clipboard</button>
                                <button @click="memoGenerated = false" class="flex-1 border border-gray-300 px-6 py-3 rounded-lg font-medium hover:bg-gray-50"><i class="fas fa-redo mr-2"></i>Regenerate</button>
                            </div>
                        </div>
                    </template>
                </div></div>
            </div>
        </div>
    </div>
</body>
</html>
