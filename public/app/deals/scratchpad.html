<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - Scratchpad</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/filing-notifications.css">
    <link rel="stylesheet" href="/css/research-scratchpad.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="_module-config.js"></script>
    <script src="/app/_shell.js"></script>
    <script src="/app/_utils.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover { background: #f9fafb; }
        .nav-item.active { background: #eff6ff; color: #1a56db; border-left: 3px solid #1a56db; }
        .nav-item.active i { color: #1a56db; }
        .badge { position: absolute; top: 8px; right: 8px; background: #dc2626; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .tenant-badge { background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
    window.FundLensScratchpadView = function() {
        return {
            scratchpadItems: [],
            scratchpadLoading: false,
            scratchpadScrolled: false,
            collapsedItems: new Set(),
            showCopyConfirmation: false,
            notebookId: null,

            async init() { await this.loadScratchpad(); this.loadScratchpadCollapseState(); },

            async loadScratchpad() {
                this.scratchpadLoading = true;
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) return;
                    var ticker = this.entityContext.value || 'default';
                    var resp = await fetch('/api/research/scratchpad/' + ticker, { headers: headers });
                    if (resp.status === 401) { window.location.href = '/login.html'; return; }
                    if (resp.ok) {
                        var data = await resp.json();
                        this.scratchpadItems = data.items || [];
                        this.scratchpadCount = data.totalCount || 0;
                        return;
                    }
                    var resp2 = await fetch('/api/research/notebooks', { headers: headers });
                    if (resp2.status === 401) { window.location.href = '/login.html'; return; }
                    if (resp2.ok) {
                        var result = await resp2.json();
                        if (result.data && result.data.length > 0) {
                            var notebook = result.data[0];
                            this.notebookId = notebook.id;
                            this.scratchpadCount = notebook._count?.insights || 0;
                            if (this.notebookId) {
                                var nbResp = await fetch('/api/research/notebooks/' + this.notebookId, { headers: headers });
                                if (nbResp.ok) {
                                    var nbData = await nbResp.json();
                                    this.scratchpadItems = (nbData.data.insights || []).map(function(insight) { return { id: insight.id, workspaceId: ticker, type: 'direct_answer', content: { text: insight.content || '', sourceCount: 0 }, sources: [], savedAt: insight.createdAt, metadata: { tags: insight.tags || [] } }; });
                                }
                            }
                        }
                    }
                } catch (error) { console.error('Error loading scratchpad:', error); }
                finally { this.scratchpadLoading = false; }
            },

            handleScratchpadScroll() { if (this.$refs.scratchpadList) this.scratchpadScrolled = this.$refs.scratchpadList.scrollTop > 10; },
            toggleScratchpadItem(itemId) { if (this.collapsedItems.has(itemId)) this.collapsedItems.delete(itemId); else this.collapsedItems.add(itemId); this.saveScratchpadCollapseState(); },
            isItemCollapsed(itemId) { return this.collapsedItems.has(itemId); },
            saveScratchpadCollapseState() { localStorage.setItem('fundlens_scratchpad_collapse_' + this.entityContext.value, JSON.stringify(Array.from(this.collapsedItems))); },
            loadScratchpadCollapseState() { var s = localStorage.getItem('fundlens_scratchpad_collapse_' + this.entityContext.value); if (s) { try { this.collapsedItems = new Set(JSON.parse(s)); } catch(e) {} } },
            getScratchpadItemTypeClass(type) { return { direct_answer: 'direct-answer', revenue_framework: 'revenue-framework', trend_analysis: 'trend-analysis', provocation: 'provocation' }[type] || 'direct-answer'; },
            getScratchpadItemTypeLabel(type) { return { direct_answer: 'Direct Answer', revenue_framework: 'Revenue Framework', trend_analysis: 'Trend Analysis', provocation: 'Provocation' }[type] || 'Insight'; },
            formatScratchpadTimestamp(ts) { if (!ts) return ''; var d = new Date(ts); var diff = Date.now() - d.getTime(); var mins = Math.floor(diff / 60000); if (mins < 1) return 'Just now'; if (mins < 60) return mins + ' min' + (mins > 1 ? 's' : '') + ' ago'; var hrs = Math.floor(diff / 3600000); if (hrs < 24) return hrs + ' hour' + (hrs > 1 ? 's' : '') + ' ago'; var days = Math.floor(diff / 86400000); if (days < 7) return days + ' day' + (days > 1 ? 's' : '') + ' ago'; return d.toLocaleDateString(); },
            formatConfidence(c) { return typeof c === 'number' ? Math.round(c * 100) + '%' : c; },
            formatMarkdown(text) { if (!text) return ''; if (typeof marked !== 'undefined') { try { return marked.parse(text); } catch(e) {} } return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); },
            getProductIcon(iconType) { return { phone: 'mobile-alt', laptop: 'laptop', tablet: 'tablet-alt', services: 'cloud', other: 'box' }[iconType] || 'box'; },
            getTrendBarWidth(value, allData) { if (!allData || allData.length === 0) return 0; var max = Math.max.apply(null, allData.map(function(d) { return d.value; })); return max === 0 ? 0 : (value / max) * 100; },
            formatCurrency(v) { return FundLensUtils.formatCurrency(v); },
            formatCurrencyShort(v) { if (!v) return '$0'; var abs = Math.abs(v); if (abs >= 1e9) return (v / 1e9).toFixed(1) + 'B'; if (abs >= 1e6) return (v / 1e6).toFixed(1) + 'M'; return v.toFixed(0); },
            formatDate(ds) { if (!ds) return ''; return new Date(ds).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); },

            async deleteScratchpadItem(itemId) {
                if (!confirm('Delete this item from your scratchpad?')) return;
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers) return;
                    var ticker = this.entityContext.value || 'default';
                    var resp = await fetch('/api/research/scratchpad/' + ticker + '/' + itemId, { method: 'DELETE', headers: headers });
                    if (resp.ok) { await this.loadScratchpad(); this.loadScratchpadCount(); this.shellEmit('scratchpad:countChanged', this.scratchpadItems.length); return; }
                    if (this.notebookId) {
                        var resp2 = await fetch('/api/research/notebooks/' + this.notebookId + '/insights/' + itemId, { method: 'DELETE', headers: headers });
                        if (resp2.ok) { await this.loadScratchpad(); this.loadScratchpadCount(); this.shellEmit('scratchpad:countChanged', this.scratchpadItems.length); }
                    }
                } catch (error) { console.error('Error deleting item:', error); alert('Error deleting item'); }
            },

            async copyScratchpadItem(item) {
                try {
                    var text = '';
                    if (item.type === 'direct_answer') text = item.content.text;
                    else if (item.type === 'revenue_framework') { text = 'Revenue Recognition Framework:\n\nPoint-in-Time:\n'; item.content.pointInTime.forEach(function(p) { text += '- ' + p.name + '\n'; }); text += '\nOver-Time:\n'; item.content.overTime.forEach(function(p) { text += '- ' + p.name + '\n'; }); }
                    else if (item.type === 'trend_analysis') { text = item.content.metric + ':\n\n'; var self = this; item.content.data.forEach(function(d) { text += d.year + ': ' + self.formatCurrency(d.value) + ' (YoY: ' + (d.yoyChange >= 0 ? '+' : '') + d.yoyChange.toFixed(1) + '%)\n'; }); }
                    else if (item.type === 'provocation') text = item.content.question;
                    await navigator.clipboard.writeText(text);
                    this.showCopyConfirmation = true;
                    var self = this;
                    setTimeout(function() { self.showCopyConfirmation = false; }, 2000);
                } catch (error) { alert('Failed to copy to clipboard'); }
            },

            async exportScratchpadMarkdown() {
                try {
                    var headers = this.getAuthHeaders();
                    if (!headers || !this.notebookId) { alert('No notebook to export'); return; }
                    var resp = await fetch('/api/research/notebooks/' + this.notebookId + '/export?format=markdown', { headers: headers });
                    if (resp.ok) { var blob = await resp.blob(); var url = window.URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = 'scratchpad-' + this.entityContext.value + '-' + new Date().toISOString().split('T')[0] + '.md'; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a); }
                } catch (error) { console.error('Error exporting:', error); alert('Error exporting scratchpad'); }
            },

            async copyScratchpadAll() {
                try {
                    var text = '# Research Scratchpad - ' + this.entityContext.value + '\n\nGenerated: ' + new Date().toLocaleString() + '\n\n';
                    var self = this;
                    this.scratchpadItems.forEach(function(item, index) {
                        text += '## ' + (index + 1) + '. ' + self.getScratchpadItemTypeLabel(item.type) + '\n\n';
                        if (item.type === 'direct_answer') text += item.content.text + '\n\n';
                        else if (item.type === 'provocation') text += '*' + item.content.question + '*\n\n';
                        text += '---\n\n';
                    });
                    await navigator.clipboard.writeText(text);
                    this.showCopyConfirmation = true;
                    setTimeout(function() { self.showCopyConfirmation = false; }, 2000);
                } catch (error) { alert('Failed to copy to clipboard'); }
            },

            addScratchpadToReport() { this.navigateTo('ic-memo'); },
            goToResearch() { this.navigateTo('research'); }
        };
    };
    </script>
</head>
<body class="bg-gray-50">
    <div x-data="FundLensShell('scratchpad', FundLensScratchpadView())" x-init="try { await init() } catch(e) { console.error('Init error:', e) }" x-cloak>

        <!-- Nav Bar -->
        <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><div class="flex items-center space-x-4"><a href="/app/deals/index.html" class="flex items-center"><div class="bg-white px-3 py-1 rounded-lg"><img src="/fundlens-logo.png" alt="FundLens" class="h-8 w-auto"></div></a><div class="hidden sm:flex items-center"><span class="text-gray-300 mx-3">|</span><div class="tenant-badge px-3 py-1 rounded-full"><span class="text-white text-sm font-medium" x-text="user.tenantName || 'Loading...'"></span></div></div></div><div class="flex items-center space-x-4"><div class="relative"><button @click="filingNotifOpen = !filingNotifOpen" class="filing-notif-bell"><i class="fas fa-bell"></i><span x-show="filingNotifCount > 0" class="filing-notif-badge" x-text="filingNotifCount > 99 ? '99+' : filingNotifCount"></span></button><div x-show="filingNotifOpen" @click.away="filingNotifOpen = false" x-transition class="filing-notif-dropdown"><div class="filing-notif-header"><h3>New Filings</h3></div><div class="filing-notif-list"><template x-if="filingNotifications.length === 0"><div class="filing-notif-empty"><i class="fas fa-check-circle"></i><p>No new filings</p></div></template><template x-for="notif in filingNotifications" :key="notif.id"><div class="filing-notif-card"><span class="filing-type-badge" :class="getFilingTypeBadgeClass(notif.filingType)" x-text="notif.filingType"></span><div class="filing-notif-content"><div class="filing-notif-ticker" x-text="notif.ticker"></div><div class="filing-notif-date" x-text="formatFilingDate(notif.filingDate)"></div></div><button @click.stop="dismissFilingNotif(notif.id)" class="filing-notif-dismiss"><i class="fas fa-times"></i></button></div></template></div></div></div><div class="relative" x-data="{ open: false }"><button @click="open = !open" class="flex items-center space-x-3 px-3 py-2 rounded-lg hover:bg-gray-100"><div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center"><span class="text-indigo-600 font-semibold text-sm" x-text="getUserInitials()"></span></div><div class="hidden md:block text-left"><p class="text-sm font-medium text-gray-700" x-text="user.email"></p></div></button><div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-200"><div class="px-4 py-3 border-b border-gray-200"><p class="text-sm font-medium text-gray-900" x-text="user.email"></p><p class="text-xs text-gray-600" x-text="user.tenantName"></p></div><div class="pt-2"><button @click="logout()" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-3"></i> Sign Out</button></div></div></div></div></div></div></nav>

        <!-- Breadcrumbs -->
        <div class="bg-white border-b border-gray-200 px-6 py-3"><div class="flex items-center space-x-2 text-sm mb-2"><template x-for="(crumb, i) in breadcrumbItems" :key="i"><span class="flex items-center space-x-2"><span x-show="i > 0"><i class="fas fa-chevron-right text-gray-400 text-xs"></i></span><a x-show="crumb.path" :href="crumb.path" class="text-gray-500 hover:text-blue-600" x-text="crumb.label"></a><span x-show="!crumb.path" class="text-gray-900 font-medium" x-text="crumb.label"></span></span></template></div><div class="flex items-center space-x-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1a56db 0%, #7c3aed 100%);"><i class="fas fa-chart-line text-white"></i></div><div><h1 class="text-lg font-bold text-gray-900" x-text="entityContext.displayName"></h1></div></div></div>

        <!-- Main Layout -->
        <div class="flex h-[calc(100vh-132px)]">
            <div class="sidebar flex flex-col" role="navigation"><nav class="flex-1 p-3 space-y-3"><template x-for="group in sidebarGroups" :key="group.label"><div><div class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-1" x-text="group.label"></div><template x-for="item in group.items" :key="item.page"><div @click="navigateTo(item.page)" :class="{'active': currentPage === item.page}" class="nav-item flex items-center px-3 py-2.5 rounded-lg cursor-pointer"><i :class="item.icon" class="w-5 text-gray-400"></i><span class="ml-3 text-sm font-medium" x-text="item.name"></span><span x-show="item.badge && $data[item.badge] > 0" class="badge" x-text="$data[item.badge]"></span></div></template></div></template></nav><div class="p-4 border-t border-gray-200"><p class="text-xs text-gray-400 mb-2">Keyboard Shortcuts</p><div class="space-y-1 text-xs text-gray-500"><template x-for="item in sidebarGroups.flatMap(g => g.items).filter(i => i.shortcut)" :key="item.shortcut"><div><span x-text="'⌘' + item.shortcut + ' - ' + item.name"></span></div></template></div></div></div>

            <!-- Scratchpad Content -->
            <div class="flex-1 overflow-hidden">
                <div class="scratchpad-container fade-in">
                    <div class="scratchpad-header" :class="{ 'scrolled': scratchpadScrolled }">
                        <div class="scratchpad-header-title"><h2>Research Scratchpad</h2><span class="scratchpad-item-count" x-text="scratchpadItems.length + ' saved items'"></span></div>
                        <div class="scratchpad-actions">
                            <button @click="exportScratchpadMarkdown()" class="scratchpad-action-btn"><i class="fas fa-download mr-2"></i>Export to Markdown</button>
                            <button @click="copyScratchpadAll()" class="scratchpad-action-btn"><i class="fas fa-copy mr-2"></i>Copy All</button>
                            <button @click="addScratchpadToReport()" class="scratchpad-action-btn primary"><i class="fas fa-file-export mr-2"></i>Add to Report</button>
                        </div>
                    </div>
                    <div class="scratchpad-items-list" x-ref="scratchpadList" @scroll="handleScratchpadScroll">
                        <template x-if="scratchpadLoading"><div class="scratchpad-loading"><div class="loading-spinner"></div><p class="loading-text">Loading saved items...</p></div></template>
                        <template x-if="!scratchpadLoading && scratchpadItems.length === 0">
                            <div class="scratchpad-empty-state"><i class="fas fa-bookmark empty-state-icon"></i><h3 class="empty-state-title">No saved items yet</h3><p class="empty-state-description">Save insights from the Research tab to build your analysis. Click "Save to Scratchpad" on any research answer.</p><button @click="goToResearch()" class="empty-state-cta"><i class="fas fa-search mr-2"></i>Go to Research</button></div>
                        </template>
                        <template x-if="!scratchpadLoading && scratchpadItems.length > 0">
                            <div>
                                <template x-for="item in scratchpadItems" :key="item.id">
                                    <div class="saved-item-card" @click="toggleScratchpadItem(item.id)" :class="{ 'collapsed': isItemCollapsed(item.id) }">
                                        <div class="saved-item-header">
                                            <div class="saved-item-meta"><span class="item-type-badge" :class="getScratchpadItemTypeClass(item.type)" x-text="getScratchpadItemTypeLabel(item.type)"></span><span class="item-timestamp" x-text="formatScratchpadTimestamp(item.savedAt)"></span></div>
                                            <button @click.stop="deleteScratchpadItem(item.id)" class="item-delete-btn" aria-label="Delete item"><i class="fas fa-trash"></i></button>
                                        </div>
                                        <div class="saved-item-content" :class="{ 'collapsed': isItemCollapsed(item.id), 'expanded': !isItemCollapsed(item.id) }">
                                            <template x-if="item.type === 'direct_answer'"><div class="direct-answer-content"><div class="direct-answer-text formatted-content" x-html="formatMarkdown(item.content.text)"></div><div class="direct-answer-badges"><template x-if="item.content.confidence"><span class="answer-badge"><i class="fas fa-check-circle mr-1"></i>Confidence: <span x-text="formatConfidence(item.content.confidence)"></span></span></template><template x-if="item.content.sourceCount"><span class="answer-badge"><i class="fas fa-file-alt mr-1"></i>Sources: <span x-text="item.content.sourceCount"></span> SEC filings</span></template></div></div></template>
                                            <template x-if="item.type === 'revenue_framework'"><div class="revenue-framework-grid"><div class="framework-column"><h4><i class="fas fa-bolt mr-2"></i>Point-in-Time Recognition</h4><div class="product-tags"><template x-for="product in item.content.pointInTime" :key="product.name"><div class="product-tag point-in-time"><i :class="'fas fa-' + getProductIcon(product.icon)" class="product-icon"></i><span x-text="product.name"></span></div></template></div></div><div class="framework-column"><h4><i class="fas fa-clock mr-2"></i>Over-Time Recognition</h4><div class="product-tags"><template x-for="product in item.content.overTime" :key="product.name"><div class="product-tag over-time"><i :class="'fas fa-' + getProductIcon(product.icon)" class="product-icon"></i><span x-text="product.name"></span></div></template></div></div></div></template>
                                            <template x-if="item.type === 'trend_analysis'"><div class="trend-analysis-content"><p class="trend-metric-label" x-text="item.content.metric"></p><div class="trend-bars"><template x-for="dataPoint in item.content.data" :key="dataPoint.year"><div class="trend-bar-row"><span class="trend-year" x-text="dataPoint.year"></span><div class="trend-bar-container"><div class="trend-bar" :style="'width: ' + getTrendBarWidth(dataPoint.value, item.content.data) + '%'" :title="dataPoint.year + ': ' + formatCurrency(dataPoint.value)"><span x-text="formatCurrencyShort(dataPoint.value)"></span></div></div><span class="yoy-badge" :class="{ 'positive': dataPoint.yoyChange >= 0, 'negative': dataPoint.yoyChange < 0 }"><i :class="dataPoint.yoyChange >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down'"></i><span x-text="Math.abs(dataPoint.yoyChange).toFixed(1) + '%'"></span></span></div></template></div></div></template>
                                            <template x-if="item.type === 'provocation'"><div class="provocation-content"><div class="provocation-header"><i class="fas fa-lightbulb provocation-icon"></i><span class="provocation-label">Think Deeper</span></div><p class="provocation-question" x-text="item.content.question"></p></div></template>
                                        </div>
                                        <div class="saved-item-footer" x-show="!isItemCollapsed(item.id)">
                                            <div class="source-chips" x-show="item.sources && item.sources.length > 0"><template x-for="source in item.sources" :key="source.url"><a :href="source.url" target="_blank" class="source-chip" @click.stop :title="'Open ' + source.filingType + ' filing'"><i class="fas fa-external-link-alt"></i><span x-text="source.ticker + ' ' + source.filingType + ' - ' + formatDate(source.filingDate)"></span></a></template></div>
                                            <button @click.stop="copyScratchpadItem(item)" class="scratchpad-action-btn" style="padding: 0.375rem 0.75rem;"><i class="fas fa-copy"></i></button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <div x-show="showCopyConfirmation" x-transition class="copy-confirmation"><i class="fas fa-check mr-2"></i>Copied to clipboard!</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
