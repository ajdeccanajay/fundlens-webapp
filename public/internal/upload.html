<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundLens - Document Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #e9ecef;
            border-color: #764ba2;
        }

        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .documents-list {
            margin-top: 20px;
        }

        .document-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .document-info {
            flex: 1;
        }

        .document-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .document-meta {
            font-size: 0.85rem;
            color: #666;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Document Upload</h1>
            <p>Upload PDFs, Word docs, PowerPoint, and more</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 24px;">Upload New Document</h2>

            <div id="alert-container"></div>

            <form id="upload-form">
                <div class="form-group">
                    <label>Document File</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="file-input" accept=".pdf,.docx,.pptx,.html,.txt" required>
                        <label for="file-input" class="file-input-label">
                            <div>📁 Click to select file</div>
                            <div style="font-size: 0.85rem; color: #666; margin-top: 8px;">
                                Supported: PDF, DOCX, PPTX, HTML, TXT (max 50MB)
                            </div>
                        </label>
                    </div>
                    <div id="file-name" class="file-name"></div>
                </div>

                <div class="form-group">
                    <label for="document-type">Document Type</label>
                    <select id="document-type" required>
                        <option value="">Select type...</option>
                        <option value="user_upload">User Upload</option>
                        <option value="earnings_transcript">Earnings Transcript</option>
                        <option value="sec_filing">SEC Filing</option>
                        <option value="news">News Article</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ticker">Ticker (Optional)</label>
                    <input type="text" id="ticker" placeholder="AAPL" style="text-transform: uppercase;">
                </div>

                <div class="form-group">
                    <label for="title">Title (Optional)</label>
                    <input type="text" id="title" placeholder="Document title">
                </div>

                <button type="submit" id="upload-btn">Upload Document</button>
            </form>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 24px;">Recent Documents</h2>
            <div id="documents-list" class="documents-list">
                <p style="color: #666;">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/documents';

        // File input handling
        document.getElementById('file-input').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('file-name').textContent = fileName ? `Selected: ${fileName}` : '';
        });

        // Form submission
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            
            if (!file) {
                showAlert('Please select a file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('documentType', document.getElementById('document-type').value);
            
            const ticker = document.getElementById('ticker').value.trim();
            if (ticker) formData.append('ticker', ticker.toUpperCase());
            
            const title = document.getElementById('title').value.trim();
            if (title) formData.append('title', title);

            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ ${data.message}`, 'success');
                    document.getElementById('upload-form').reset();
                    document.getElementById('file-name').textContent = '';
                    loadDocuments();
                } else {
                    showAlert(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Upload failed: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload Document';
            }
        });

        // Load documents
        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}?limit=10`);
                const data = await response.json();

                const container = document.getElementById('documents-list');
                
                if (data.documents.length === 0) {
                    container.innerHTML = '<p style="color: #666;">No documents uploaded yet</p>';
                    return;
                }

                container.innerHTML = data.documents.map(doc => `
                    <div class="document-item">
                        <div class="document-info">
                            <div class="document-title">
                                ${doc.title}
                                ${doc.processed ? '<span class="badge badge-success">✓ Ready</span>' : '<span class="badge badge-warning">⏳ Processing</span>'}
                            </div>
                            <div class="document-meta">
                                ${doc.ticker || 'No ticker'} • ${doc.documentType} • ${formatFileSize(doc.fileSize)} • ${new Date(doc.uploadDate).toLocaleDateString()}
                                ${doc.chunksCount > 0 ? ` • ${doc.chunksCount} chunks` : ''}
                            </div>
                        </div>
                        ${doc.processed ? `
                            <button onclick="downloadDocument('${doc.id}')" style="padding: 8px 16px; font-size: 0.9em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                                📥 Download
                            </button>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading documents:', error);
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function formatFileSize(bytes) {
            const size = parseInt(bytes);
            if (size < 1024) return size + ' B';
            if (size < 1024 * 1024) return (size / 1024).toFixed(1) + ' KB';
            return (size / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Download document
        async function downloadDocument(documentId) {
            try {
                // Use direct download endpoint
                window.location.href = `${API_BASE}/download/${documentId}`;
            } catch (error) {
                showAlert(`❌ Download failed: ${error.message}`, 'error');
            }
        }

        // Load documents on page load
        loadDocuments();
    </script>
</body>
</html>
