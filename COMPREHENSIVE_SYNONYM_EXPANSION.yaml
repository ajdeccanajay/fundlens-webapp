# COMPREHENSIVE SYNONYM EXPANSION — Addendum to Kiro Spec v2
#
# This file contains the ADDITIONAL synonyms to add to each metric definition
# in the existing YAML files. These cover:
#
# 1. Analyst colloquial language ("top line", "bottom line", "burn rate")
# 2. SEC filing raw labels (what actually appears in 10-K/10-Q statements)
# 3. IFRS terminology (for non-US filers)
# 4. Private equity terminology ("run-rate", "adjusted EBITDA")
# 5. Abbreviations and shorthand ("rev", "NI", "GP", "opex")
# 6. Common misspellings and alternate spellings
# 7. Amazon/tech-specific labels ("net product sales", "net service sales")
# 8. Storage-normalized forms are NOT needed — getSynonymsForDbColumn()
#    auto-generates them (e.g., "Net Sales" → "net_sales")
#
# normalizeForLookup() strips all non-alphanumeric chars and lowercases.
# So "Net Revenue" and "net_revenue" and "NET REVENUE" all normalize to
# "netrevenue" and match identically. We only need to add semantically
# distinct synonyms — not formatting variants.
#
# INSTRUCTIONS FOR KIRO:
# For each metric below, ADD these synonyms to the existing synonyms list
# in the corresponding YAML file. Do not remove existing synonyms.
# The normalization chain handles case/spacing/underscores automatically.

# ═══════════════════════════════════════════════════════════════════════
# INCOME STATEMENT — income_statement.yaml
