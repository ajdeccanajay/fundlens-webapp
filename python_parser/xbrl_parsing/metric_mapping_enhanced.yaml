conventions:
  ttm: TTM_SUM sums the last 4 consecutive fiscal quarters
  period_filter: Match element periodType instant vs duration
  unit_filter: Filter facts by expected unit (USD/shares/percent)
  dimension_policy: Use non-dimensional facts for consolidated totals
  sign_policy: Normalize sign using element balance and label conventions
frames:
  quarter_len_days:
    - 60
    - 120
  ttm_method: roll_4q_duration
unit_candidates:
  - USD
  - iso4217:USD
  - shares
  - percent
unit_normalize_to: USD
validation:
  min: -1000000000000000
  max: 1000000000000000
rounding:
  unit: USD
  decimals: 0
