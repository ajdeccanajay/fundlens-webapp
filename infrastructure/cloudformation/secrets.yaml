AWSTemplateFormatVersion: '2010-09-09'
Description: 'FundLens Secrets Manager Configuration'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
    Description: Environment name

  # Database credentials (passed securely during deployment)
  DatabaseHost:
    Type: String
    Default: fundlens-db.c858420i2mml.us-east-1.rds.amazonaws.com
    Description: RDS database host

  DatabasePort:
    Type: String
    Default: '5432'
    Description: RDS database port

  DatabaseName:
    Type: String
    Default: fundlens_db
    Description: Database name

  DatabaseUsername:
    Type: String
    Default: fundlens_admin
    NoEcho: true
    Description: Database username

  DatabasePassword:
    Type: String
    NoEcho: true
    Description: Database password

  # Cognito credentials
  CognitoClientId:
    Type: String
    Default: 4s4k1usimlqkr6sk55gbva183s
    Description: Cognito App Client ID

  CognitoClientSecret:
    Type: String
    NoEcho: true
    Description: Cognito App Client Secret

  # Platform admin key
  PlatformAdminKey:
    Type: String
    NoEcho: true
    Description: Platform admin API key

Resources:
  # ===========================================================================
  # Database Credentials Secret
  # ===========================================================================
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fundlens/${Environment}/database'
      Description: FundLens database credentials
      SecretString: !Sub |
        {
          "host": "${DatabaseHost}",
          "port": "${DatabasePort}",
          "database": "${DatabaseName}",
          "username": "${DatabaseUsername}",
          "password": "${DatabasePassword}",
          "DATABASE_URL": "postgresql://${DatabaseUsername}:${DatabasePassword}@${DatabaseHost}:${DatabasePort}/${DatabaseName}?sslmode=require&connection_limit=10&pool_timeout=30"
        }
      Tags:
        - Key: Name
          Value: !Sub 'fundlens-${Environment}-database-secret'
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # Cognito Credentials Secret
  # ===========================================================================
  CognitoSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fundlens/${Environment}/cognito'
      Description: FundLens Cognito credentials
      SecretString: !Sub |
        {
          "userPoolId": "us-east-1_4OYqnpE18",
          "clientId": "${CognitoClientId}",
          "clientSecret": "${CognitoClientSecret}",
          "region": "us-east-1"
        }
      Tags:
        - Key: Name
          Value: !Sub 'fundlens-${Environment}-cognito-secret'
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # Platform Admin Secret
  # ===========================================================================
  PlatformSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fundlens/${Environment}/platform'
      Description: FundLens platform admin credentials
      SecretString: !Sub |
        {
          "adminKey": "${PlatformAdminKey}"
        }
      Tags:
        - Key: Name
          Value: !Sub 'fundlens-${Environment}-platform-secret'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DatabaseSecretArn:
    Description: Database Secret ARN
    Value: !Ref DatabaseSecret
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseSecretArn'

  CognitoSecretArn:
    Description: Cognito Secret ARN
    Value: !Ref CognitoSecret
    Export:
      Name: !Sub '${AWS::StackName}-CognitoSecretArn'

  PlatformSecretArn:
    Description: Platform Secret ARN
    Value: !Ref PlatformSecret
    Export:
      Name: !Sub '${AWS::StackName}-PlatformSecretArn'
